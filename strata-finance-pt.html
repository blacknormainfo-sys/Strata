<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>STRATA — Contabilidade &amp; Finanças</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#080809; --s1:#0E0E10; --s2:#141416; --s3:#1A1A1D; --s4:#212125; --s5:#28282D;
  --b1:#252529; --b2:#32323A; --b3:#424249;
  --t1:#F0F0F5; --t2:#8A8A9A; --t3:#4A4A58;
  --teal:#0DCFB0; --teal2:#09A48C; --tb:#071E1A; --tl:rgba(13,207,176,0.12);
  --amber:#F5A623; --ab:#1E1200;
  --red:#F55050; --rb:#1E0808;
  --blue:#4DA8F5; --bb:#071828;
  --green:#2ECC8A; --gb:#071A10;
  --purple:#8B7CF6; --pb:#1A1730;
  --fh:'Barlow Condensed',sans-serif; --fb:'Barlow',sans-serif;
  --r1:6px; --r2:10px; --r3:14px;
}
html,body { height:100%; background:var(--bg); color:var(--t1); font-family:var(--fb); font-size:13px; overflow:hidden; }
#root { display:flex; height:100vh; }

/* SIDEBAR */
.sb { width:220px; min-width:220px; background:var(--s1); border-right:1px solid var(--b1); display:flex; flex-direction:column; overflow:hidden; }
.sb-logo { padding:16px 14px 14px; border-bottom:1px solid var(--b1); display:flex; align-items:center; gap:9px; }
.sb-name { font-family:var(--fh); font-size:17px; font-weight:700; letter-spacing:2px; }
.sb-sub  { font-size:8px; color:var(--t3); letter-spacing:1.2px; text-transform:uppercase; margin-top:1px; }
.sb-sec  { padding:14px 12px 4px; font-size:9px; font-weight:600; color:var(--t3); text-transform:uppercase; letter-spacing:1.5px; }
.sb-item { display:flex; align-items:center; gap:8px; padding:7px 10px; margin:1px 6px; border-radius:var(--r1); cursor:pointer; color:var(--t2); font-size:12px; border:1px solid transparent; background:transparent; width:calc(100% - 12px); text-align:left; font-family:var(--fb); letter-spacing:0.3px; transition:all 0.12s; }
.sb-item:hover { background:var(--s3); color:var(--t1); }
.sb-item.on { background:var(--tb); color:var(--teal); font-weight:500; border-color:rgba(13,207,176,0.1); }
.sb-badge { margin-left:auto; font-size:9px; padding:1px 6px; border-radius:6px; font-weight:700; }
.sb-badge-red { background:var(--rb); color:var(--red); }
.sb-badge-teal { background:var(--teal); color:#000; }
.sb-bot { margin-top:auto; padding:12px; border-top:1px solid var(--b1); }
.sb-av  { width:26px; height:26px; border-radius:50%; background:var(--tb); border:1px solid var(--teal); display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:700; color:var(--teal); font-family:var(--fh); letter-spacing:1px; flex-shrink:0; }

/* MAIN */
.main { flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0; }
.topbar { height:50px; background:var(--s1); border-bottom:1px solid var(--b1); display:flex; align-items:center; padding:0 20px; gap:12px; flex-shrink:0; }
.tb-title { font-family:var(--fh); font-size:15px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; }
.tb-badge { font-size:9px; padding:2px 9px; border-radius:20px; font-weight:700; letter-spacing:1px; text-transform:uppercase; }
.tb-teal  { background:var(--tb); color:var(--teal); border:1px solid rgba(13,207,176,0.18); }
.tb-amber { background:var(--ab); color:var(--amber); border:1px solid rgba(245,166,35,0.18); }
.tb-right { margin-left:auto; display:flex; gap:8px; align-items:center; }
.content  { flex:1; overflow-y:auto; padding:20px; }
.content::-webkit-scrollbar { width:3px; }
.content::-webkit-scrollbar-thumb { background:var(--b2); border-radius:2px; }

/* BUTTONS */
.btn { display:inline-flex; align-items:center; gap:5px; padding:7px 16px; border-radius:var(--r1); font-size:12px; font-weight:600; cursor:pointer; border:none; font-family:var(--fb); letter-spacing:0.5px; transition:all 0.12s; white-space:nowrap; }
.btn-teal   { background:var(--teal);  color:#000; }   .btn-teal:hover   { background:var(--teal2); }
.btn-ghost  { background:transparent; color:var(--t2); border:1px solid var(--b2); } .btn-ghost:hover { background:var(--s3); color:var(--t1); }
.btn-ok     { background:var(--gb);   color:var(--green); border:1px solid #0D3020; }
.btn-warn   { background:var(--ab);   color:var(--amber); border:1px solid #3A2000; }
.btn-danger { background:var(--rb);   color:var(--red);   border:1px solid #3A1010; }
.btn-sm { padding:4px 11px; font-size:11px; }
.btn-xs { padding:2px 8px;  font-size:10px; }

/* INPUTS */
.inp { background:var(--s3); border:1px solid var(--b1); border-radius:var(--r1); padding:7px 11px; font-size:12px; color:var(--t1); font-family:var(--fb); outline:none; transition:border-color 0.12s; width:100%; }
.inp:focus { border-color:var(--teal); }
.inp::placeholder { color:var(--t3); }
textarea.inp { resize:vertical; min-height:70px; line-height:1.5; }
select.inp { cursor:pointer; }
select.inp option { background:var(--s3); color:var(--t1); }
input[type="number"].inp { -moz-appearance:textfield; }
input[type="date"].inp { color-scheme:dark; }

/* CARDS */
.card  { background:var(--s2); border:1px solid var(--b1); border-radius:var(--r3); padding:16px; }
.card2 { background:var(--s3); border:1px solid var(--b1); border-radius:var(--r2); padding:12px; }
.card-title { font-size:9px; font-weight:700; color:var(--t3); text-transform:uppercase; letter-spacing:1.5px; margin-bottom:12px; }

/* GRIDS */
.g2 { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px; }
.g3 { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:12px; }
.g4 { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:12px; }

/* SECTION HEADER */
.sec-hd { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:18px; gap:12px; }
.sec-title { font-family:var(--fh); font-size:18px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; }
.sec-sub   { font-size:11px; color:var(--t2); margin-top:2px; }

/* METRIC CARD */
.m-card { background:var(--s2); border:1px solid var(--b1); border-radius:var(--r2); padding:14px; }
.m-lbl  { font-size:9px; font-weight:700; color:var(--t3); text-transform:uppercase; letter-spacing:1.2px; margin-bottom:5px; }
.m-val  { font-family:var(--fh); font-size:24px; font-weight:700; letter-spacing:-0.5px; margin-bottom:3px; }
.m-chg  { font-size:10px; font-weight:600; }
.up   { color:var(--green); }
.down { color:var(--red);   }
.neu  { color:var(--t2);    }

/* TABLE */
.tbl-wrap { overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-size:12px; }
th { text-align:left; padding:8px 12px; color:var(--t3); font-size:9px; font-weight:700; letter-spacing:0.8px; text-transform:uppercase; border-bottom:1px solid var(--b1); white-space:nowrap; }
td { padding:10px 12px; border-bottom:1px solid var(--b1); color:var(--t2); }
td.bold { color:var(--t1); font-weight:500; }
tr:last-child td { border:none; }
tr:hover td { background:var(--s3); }

/* BADGES */
.bdg { display:inline-flex; align-items:center; gap:3px; font-size:9px; padding:2px 7px; border-radius:4px; font-weight:700; letter-spacing:0.5px; text-transform:uppercase; white-space:nowrap; }
.bdg-g  { background:var(--gb); color:var(--green); }
.bdg-a  { background:var(--ab); color:var(--amber); }
.bdg-r  { background:var(--rb); color:var(--red);   }
.bdg-t  { background:var(--tb); color:var(--teal);  }
.bdg-b  { background:var(--bb); color:var(--blue);  }
.bdg-p  { background:var(--pb); color:var(--purple);}
.bdg-gr { background:var(--s4); color:var(--t2);    }
.bdot   { width:5px; height:5px; border-radius:50%; background:currentColor; display:inline-block; }

/* TABS */
.tab-bar { display:flex; background:var(--s2); border-radius:var(--r1); padding:3px; width:fit-content; margin-bottom:16px; border:1px solid var(--b1); gap:0; }
.tab-btn { padding:5px 14px; border-radius:4px; font-size:11px; font-weight:500; cursor:pointer; color:var(--t2); border:none; background:transparent; font-family:var(--fb); letter-spacing:0.4px; transition:all 0.12s; text-transform:uppercase; white-space:nowrap; }
.tab-btn.on { background:var(--s4); color:var(--t1); }

/* FORM FIELD */
.fld { margin-bottom:11px; }
.fld label { font-size:9px; font-weight:700; color:var(--t3); text-transform:uppercase; letter-spacing:1px; display:block; margin-bottom:4px; }
.fld-row { display:grid; gap:10px; }

/* ROWS */
.hrow { display:flex; align-items:center; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--b1); transition:background 0.1s; }
.hrow:hover { background:var(--s3); }
.hrow:last-child { border:none; }
.srow { display:flex; justify-content:space-between; align-items:center; padding:7px 0; border-bottom:1px solid var(--b1); font-size:12px; }
.srow:last-child { border:none; }
.srow-l { color:var(--t2); }
.srow-v { font-weight:600; color:var(--t1); }

/* PROGRESS */
.prog { height:3px; background:var(--s4); border-radius:2px; overflow:hidden; margin-top:5px; }
.prog-fill { height:100%; border-radius:2px; background:var(--teal); }

/* TIMELINE */
.tl-item { display:flex; gap:12px; padding:9px 0; position:relative; }
.tl-dot  { width:9px; height:9px; border-radius:50%; background:var(--teal); margin-top:3px; flex-shrink:0; box-shadow:0 0 0 3px var(--tb); }
.tl-line { position:absolute; left:4px; top:16px; bottom:0; width:1px; background:var(--b1); }
.tl-title { font-size:12px; font-weight:500; color:var(--t1); margin-bottom:2px; }
.tl-meta  { font-size:10px; color:var(--t3); }

/* SPARKLINE */
.spark { display:flex; align-items:flex-end; gap:3px; height:40px; }
.spark-bar { flex:1; border-radius:1px 1px 0 0; min-height:2px; background:var(--s4); }
.spark-bar.hi { background:var(--teal); }

/* DIVIDER */
hr { border:none; border-top:1px solid var(--b1); margin:14px 0; }
.mb8 { margin-bottom:8px; } .mb12 { margin-bottom:12px; } .mb16 { margin-bottom:16px; }

/* ALERT BOX */
.alert { padding:10px 14px; border-radius:var(--r1); font-size:12px; line-height:1.5; margin-bottom:12px; display:flex; gap:10px; align-items:flex-start; }
.alert-warn { background:rgba(245,166,35,0.08); border:1px solid rgba(245,166,35,0.2); color:var(--amber); }
.alert-info { background:rgba(13,207,176,0.06); border:1px solid rgba(13,207,176,0.15); color:var(--teal); }
.alert-red  { background:rgba(245,80,80,0.08);  border:1px solid rgba(245,80,80,0.2);  color:var(--red);  }

/* CALC RESULT */
.calc-result { background:var(--s3); border:1px solid var(--b1); border-radius:var(--r2); padding:14px; }
.calc-row { display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px solid var(--b1); font-size:12px; }
.calc-row:last-child { border:none; font-weight:700; color:var(--teal); font-family:var(--fh); font-size:14px; }
.calc-row-l { color:var(--t2); }
.calc-row-v { font-weight:500; color:var(--t1); }

/* INVOICE */
.inv-doc { background:var(--s2); border:1px solid var(--b1); border-radius:var(--r3); padding:24px; }
.inv-line-tbl { width:100%; border-collapse:collapse; font-size:12px; margin:14px 0; }
.inv-line-tbl th { text-align:left; padding:6px 8px; background:var(--s3); font-size:9px; font-weight:700; color:var(--t3); text-transform:uppercase; letter-spacing:0.8px; }
.inv-line-tbl td { padding:8px 8px; border-bottom:1px solid var(--b1); }
.inv-line-tbl td input { background:transparent; border:none; color:var(--t1); font-family:var(--fb); font-size:12px; width:100%; outline:none; }
.inv-total-row { display:flex; justify-content:space-between; padding:4px 0; font-size:12px; }
.inv-total-row.final { font-family:var(--fh); font-size:16px; font-weight:700; color:var(--teal); padding-top:8px; border-top:1px solid var(--b1); margin-top:4px; }

/* AT STATUS */
.at-status { display:flex; align-items:center; gap:6px; font-size:10px; padding:4px 10px; border-radius:4px; background:var(--gb); color:var(--green); font-weight:600; }

@keyframes shimmer { 0%{background-position:-400px 0} 100%{background-position:400px 0} }
.shimmer { background:linear-gradient(90deg,var(--s2) 25%,var(--s3) 50%,var(--s2) 75%); background-size:800px 100%; animation:shimmer 1.4s infinite; border-radius:4px; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.pulsing { animation:pulse 1s ease-in-out infinite; }
input[type=range] { accent-color:var(--teal); width:100%; }

/* ── RH / OCR / EMPRESA ── */
.colab-card{background:var(--s2);border:1px solid var(--b1);border-radius:var(--r2);padding:14px;transition:border-color 0.15s;cursor:pointer}
.colab-card:hover{border-color:var(--b2)}
.colab-av{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-size:14px;font-weight:700;letter-spacing:1px;flex-shrink:0}
.colab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.status-ativo{background:var(--gb);color:var(--green)}
.status-ferias{background:var(--bb);color:var(--blue)}
.status-baixa{background:var(--rb);color:var(--red)}
.status-licenca{background:var(--ab);color:var(--amber)}
.status-processo{background:var(--pb);color:var(--purple)}

/* Step wizard */
.step-wizard{display:flex;align-items:center;gap:0;margin-bottom:24px}
.sw-step{display:flex;align-items:center;gap:8px;flex:1}
.sw-step:last-child{flex:none}
.sw-dot{width:28px;height:28px;border-radius:50%;background:var(--s4);border:1px solid var(--b2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--t3);flex-shrink:0;transition:all 0.2s}
.sw-dot.done{background:var(--teal);border-color:var(--teal);color:#000}
.sw-dot.active{background:var(--tb);border-color:var(--teal);color:var(--teal)}
.sw-label{font-size:10px;color:var(--t3);font-weight:500}
.sw-label.active{color:var(--teal)}
.sw-line{flex:1;height:1px;background:var(--b1);margin:0 6px}
.sw-line.done{background:var(--teal)}

/* OCR upload */
.ocr-drop{border:2px dashed var(--b2);border-radius:var(--r3);padding:48px 24px;text-align:center;cursor:pointer;transition:all 0.2s;position:relative}
.ocr-drop:hover,.ocr-drop.drag{border-color:var(--teal);background:var(--tb)}
.ocr-drop input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;z-index:2}
.ocr-preview{border-radius:var(--r2);overflow:hidden;border:1px solid var(--b1);max-height:280px;display:flex;align-items:center;justify-content:center;background:var(--s3)}
.ocr-preview img{max-width:100%;max-height:280px;object-fit:contain}
.ocr-field{background:var(--s3);border:1px solid var(--b1);border-radius:var(--r1);padding:7px 11px;font-size:12px;color:var(--t1);font-family:var(--fb);transition:border-color 0.12s;width:100%}
.ocr-field:focus{border-color:var(--teal);outline:none}
.ocr-field.auto{border-color:rgba(13,207,176,0.4);background:rgba(13,207,176,0.04)}

/* Empresa docs */
.doc-card{background:var(--s2);border:1px solid var(--b1);border-radius:var(--r2);padding:14px;display:flex;align-items:flex-start;gap:12px}
.doc-card-icon{width:38px;height:38px;border-radius:var(--r1);background:var(--s3);border:1px solid var(--b2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.doc-valid{font-size:9px;padding:2px 7px;border-radius:4px;font-weight:700;letter-spacing:0.5px}
.doc-valid-ok{background:var(--gb);color:var(--green)}
.doc-valid-warn{background:var(--ab);color:var(--amber)}
.doc-valid-exp{background:var(--rb);color:var(--red)}

/* Calendar heatmap */
.cal-hm{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-hm-head{font-size:8px;color:var(--t3);text-align:center;padding:3px 0;font-weight:600;letter-spacing:0.5px}
.cal-hm-cell{height:30px;border-radius:4px;background:var(--s3);border:1px solid var(--b1);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--t3);cursor:default;position:relative}
.cal-hm-cell.ferias{background:var(--bb);border-color:var(--blue);color:var(--blue)}
.cal-hm-cell.falta{background:var(--rb);border-color:var(--red);color:var(--red)}
.cal-hm-cell.baixa{background:var(--ab);border-color:var(--amber);color:var(--amber)}
.cal-hm-cell.feriado{background:var(--pb);border-color:var(--purple);color:var(--purple)}
.cal-hm-cell.today{border-color:var(--teal);color:var(--teal)}


/* Toggle switch */
.tog{width:36px;height:20px;border-radius:10px;background:var(--s4);border:1px solid var(--b2);cursor:pointer;position:relative;flex-shrink:0;transition:all 0.2s}
.tog::after{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:var(--t3);transition:all 0.2s}
.tog.on{background:var(--teal);border-color:var(--teal2)}
.tog.on::after{left:18px;background:#000}
/* Utility */
.mt12{margin-top:12px}
.mt8{margin-top:8px}

.sw{display:flex;align-items:center;gap:0;margin-bottom:22px;overflow-x:auto}.sw-step{display:flex;align-items:center;gap:6px;flex-shrink:0}.sw-num{width:26px;height:26px;border-radius:50%;background:var(--s4);border:1px solid var(--b2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--t3);flex-shrink:0;transition:all .2s}.sw-num.done{background:var(--teal);border-color:var(--teal);color:#000}.sw-num.active{background:var(--tb);border-color:var(--teal);color:var(--teal)}.sw-label{font-size:10px;color:var(--t3);white-space:nowrap}.sw-label.active{color:var(--teal)}.sw-line{width:20px;height:1px;background:var(--b1);flex-shrink:0;margin:0 4px}.sw-line.done{background:var(--teal)}
.sb-scroll{flex:1;overflow-y:auto;overflow-x:hidden}.sb-scroll::-webkit-scrollbar{width:3px}.sb-scroll::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
</style>

<script>
/* STRATA — Anthropic API key from localStorage */
(function() {
  var KEY_NAME = 'strata_anthropic_key';
  function getApiKey() { return localStorage.getItem(KEY_NAME) || ''; }

  /* Patch fetch to auto-inject headers for Anthropic API calls */
  var _fetch = window.fetch;
  window.fetch = function(url, opts) {
    if (typeof url === 'string' && url.includes('api.anthropic.com')) {
      var key = getApiKey();
      if (!key) {
        return Promise.reject(new Error('API Key não configurada. Acede ao hub principal e configura a tua Anthropic API Key.'));
      }
      opts = opts || {};
      opts.headers = Object.assign({}, opts.headers, {
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-calls': 'true'
      });
    }
    return _fetch.apply(window, [url, opts]);
  };

  /* Show key status badge */
  window.addEventListener('DOMContentLoaded', function() {
    var key = getApiKey();
    var badge = document.createElement('a');
    badge.href = '/';
    badge.title = key ? 'API Key configurada — clica para voltar ao hub' : 'API Key não configurada — clica para configurar';
    badge.style.cssText = 'position:fixed;bottom:16px;right:16px;z-index:9999;display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.5px;text-decoration:none;font-family:Barlow,sans-serif;transition:all .15s;border:1px solid;';
    if (key) {
      badge.style.background = 'rgba(40,200,122,.12)';
      badge.style.borderColor = 'rgba(40,200,122,.3)';
      badge.style.color = '#28C87A';
      badge.innerHTML = '<svg width="9" height="9" viewBox="0 0 9 9" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4.5l2.5 2.5 5-5"/></svg> IA Activa';
    } else {
      badge.style.background = 'rgba(245,166,35,.1)';
      badge.style.borderColor = 'rgba(245,166,35,.3)';
      badge.style.color = '#F5A623';
      badge.innerHTML = '<svg width="9" height="9" viewBox="0 0 9 9" fill="none" stroke="currentColor" stroke-width="2"><path d="M4.5 1v3M4.5 6v.5"/><circle cx="4.5" cy="4.5" r="4"/></svg> Configurar Key';
    }
    document.body.appendChild(badge);
  });
})();
</script>

</head>
<body>
<div id="root">

// Calculate IVA liquidado (collected from clients)
function calcIVA_liquidado() {
  return FATURAS.filter(f=>f.estado!=='anulada').reduce((s,f)=>s+f.iva,0);
}
// Calculate IVA dedutível (on expenses)
function calcIVA_dedutivel() {
  return DESPESAS.filter(d=>d.iva_dedutivel).reduce((s,d)=>s+d.valor*IVA[d.taxa],0);
}

// IRS Retenção na fonte (tabela 2025)
function calcRetencao(salario_bruto, dependentes, estado_civil) {
  // SS trabalhador
  const ss = salario_bruto * SS.trabalhador;
  const rendimento_liquido_ss = salario_bruto - ss;
  // Simplificado — tabela geral (solteiro, sem dependentes como base)
  let taxa = 0, parcela = 0;
  const tbl = IRS_TABELA_2025;
  for (const linha of tbl) {
    if (rendimento_liquido_ss <= linha.ate) { taxa = linha.taxa; parcela = linha.parcela; break; }
  }
  // Abatimento dependentes (~25.50€/dependente/mês)
  const abat_dep = dependentes * 25.50;
  // Estado civil casado único titular reduz ~10%
  let ret = salario_bruto * taxa - parcela - abat_dep;
  if (estado_civil === 'casado') ret = ret * 0.90;
  return Math.max(0, Math.round(ret));
}

// Calculate IRC
function calcIRC(lucro_tributavel) {
  if (lucro_tributavel <= 0) return { coleta:0, derrama:0, total:0 };
  let coleta = 0;
  const limite_pme = 50000;
  if (lucro_tributavel <= limite_pme) {
    coleta = lucro_tributavel * IRC.pme_reduzida;
  } else {
    coleta = limite_pme * IRC.pme_reduzida + (lucro_tributavel - limite_pme) * IRC.geral;
  }
  let derrama = 0;
  if (lucro_tributavel > 1500000) {
    const base1 = Math.min(lucro_tributavel, 7500000) - 1500000;
    derrama += base1 * IRC.derrama_estadual_1;
  }
  if (lucro_tributavel > 7500000) {
    const base2 = Math.min(lucro_tributavel, 35000000) - 7500000;
    derrama += base2 * IRC.derrama_estadual_2;
  }
  if (lucro_tributavel > 35000000) {
    derrama += (lucro_tributavel - 35000000) * IRC.derrama_estadual_3;
  }
  return { coleta: Math.round(coleta), derrama: Math.round(derrama), total: Math.round(coleta + derrama) };
}

function setPeriod(period, btn) {

  if (btn) btn.classList.add('on');
  renderMainChart(period);

function renderMainChart(period) {
  const wrap = document.getElementById('main-chart-wrap');
  if (!wrap) return;

  const d = CHART_DATA[period];
  const isYoY = period === 'yoy';
  const isTri = period === 'trimestral';
  const labels = d.labels;
  const n = labels.length;

  // Trim future quarters
  const r26  = d.rec2026.filter(v => v > 0);
  const d26  = d.desp2026.filter(v => v > 0);
  const r25  = d.rec2025.filter(v => v > 0);
  const d25  = d.desp2025.filter(v => v > 0);
  const lbl  = isTri
    ? labels.filter((_, i) => d.rec2026[i] > 0 || d.rec2025[i] > 0)
    : labels;

  const series = isYoY || isTri
    ? [{data: r26,  color:'#0DCFB0', label:'Receitas 2026'},
       {data: d26,  color:'#F55050', label:'Despesas 2026'},
       {data: r25,  color:'#0DCFB040', label:'Receitas 2025', dashed:true},
       {data: d25,  color:'#F5505040', label:'Despesas 2025', dashed:true}]
    : [{data: r26,  color:'#0DCFB0', label:'Receitas'},
       {data: d26,  color:'#F55050', label:'Despesas'}];

  const allVals = series.flatMap(s => s.data).filter(v => v > 0);
  const maxVal  = Math.max(...allVals) * 1.12;
  const minVal  = 0;

  const W = 480, H = 180, PL = 48, PR = 14, PT = 12, PB = 32;
  const cW = W - PL - PR, cH = H - PT - PB;
  const actualN = lbl.length;
  const step = cW / Math.max(actualN - 1, 1);
  const yScale = v => PT + cH - ((v - minVal) / (maxVal - minVal)) * cH;

  // Y axis ticks
  const nTicks = 4;
  let gridLines = '';
  let yLabels = '';
  for (let i = 0; i <= nTicks; i++) {
    const val = minVal + (maxVal - minVal) * (i / nTicks);
    const y = yScale(val);
    gridLines += `<line x1="${PL}" y1="${y}" x2="${W - PR}" y2="${y}" stroke="#252529" stroke-width="1"/>`;
    yLabels += `<text x="${PL - 4}" y="${y + 3.5}" text-anchor="end" fill="#4A4A58" font-size="9" font-family="Barlow,sans-serif">${val >= 1000 ? (val/1000).toFixed(0)+'k' : val.toFixed(0)}</text>`;
  }

  // X axis labels
  let xLabels = '';
  const step2 = Math.max(1, Math.floor(actualN / 8));
  for (let i = 0; i < actualN; i += step2) {
    const x = PL + i * step;
    xLabels += `<text x="${x}" y="${H - PB + 14}" text-anchor="middle" fill="#4A4A58" font-size="9" font-family="Barlow,sans-serif">${lbl[i]}</text>`;
  }

  // Paths & dots
  let paths = '';
  let dots  = '';
  let tooltipAreas = '';
  const colors = ['#0DCFB0','#F55050','#4DA8F5','#F5A623'];

  series.forEach((s, si) => {
    if (!s.data || s.data.length === 0) return;
    const pts = s.data.map((v, i) => [PL + i * step, yScale(v)]);
    const col = s.color || colors[si % colors.length];
    const isDashed = !!s.dashed;

    // Area fill (only for non-dashed)
    if (!isDashed) {
      const areaPath = pts.map((p, i) => (i === 0 ? `M${p[0]},${p[1]}` : `L${p[0]},${p[1]}`)).join(' ')
        + ` L${pts[pts.length-1][0]},${PT + cH} L${pts[0][0]},${PT + cH} Z`;
      paths += `<path d="${areaPath}" fill="${col}" opacity="0.06"/>`;
    }

    // Line
    const linePath = pts.map((p, i) => (i === 0 ? `M${p[0]},${p[1]}` : `L${p[0]},${p[1]}`)).join(' ');
    paths += `<path d="${linePath}" fill="none" stroke="${col}" stroke-width="${isDashed?1.5:2}" ${isDashed?'stroke-dasharray="4,3"':''}/>`;

    // Dots (only non-dashed)
    if (!isDashed) {
      pts.forEach(([x, y], i) => {
        const val = s.data[i];
        dots += `<circle cx="${x}" cy="${y}" r="3" fill="${col}" stroke="var(--s2)" stroke-width="1.5"/>`;
        tooltipAreas += `<circle cx="${x}" cy="${y}" r="8" fill="transparent">`
          + `<title>${lbl[i]} — ${s.label}: €${val.toLocaleString('pt-PT')}</title></circle>`;
      });
    }
  });

  // Legend
  const legend = series.map(s =>
    `<div style="display:flex;align-items:center;gap:5px;font-size:10px;color:var(--t2)">`
    + `<div style="width:16px;height:2px;background:${s.color};border-radius:1px;${s.dashed?'background:linear-gradient(90deg,'+s.color+' 50%,transparent 50%);background-size:5px 2px;':''}">${s.dashed?'':''}</div>${s.label}</div>`
  ).join('');

  wrap.innerHTML = `
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block;overflow:visible" xmlns="http://www.w3.org/2000/svg">
      <!-- Grid -->
      ${gridLines}
      <!-- Paths & areas -->
      ${paths}
      <!-- Dots & tooltips -->
      ${dots}${tooltipAreas}
      <!-- Axes -->
      <line x1="${PL}" y1="${PT}" x2="${PL}" y2="${PT+cH}" stroke="#32323A" stroke-width="1"/>
      <line x1="${PL}" y1="${PT+cH}" x2="${W-PR}" y2="${PT+cH}" stroke="#32323A" stroke-width="1"/>
      <!-- Labels -->
      ${yLabels}
      ${xLabels}
    </svg>
    <div style="display:flex;gap:14px;flex-wrap:wrap;margin-top:8px">${legend}</div>
    <div style="display:flex;gap:16px;margin-top:10px;padding-top:10px;border-top:1px solid var(--b1)">
      ${[
        ['Receitas 2026',fmt(r26.reduce((a,b)=>a+b,0)),'var(--teal)'],
        ['Despesas 2026',fmt(d26.reduce((a,b)=>a+b,0)),'var(--red)'],
        (isYoY||isTri)?['Var. Receitas','+'+Math.round((r26.reduce((a,b)=>a+b,0)/r25.reduce((a,b)=>a+b,0)-1)*100)+'%','var(--green)']:null,
      ].filter(Boolean).map(([l,v,col])=>`
        <div><div style="font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px">${l}</div>
        <div style="font-family:var(--fh);font-size:16px;font-weight:700;color:${col}">${v}</div></div>
      `).join('')}
    </div>`;
}

function renderResultadoChart() {
  const wrap = document.getElementById('resultado-chart');
  if (!wrap) return;

  const data = RESULTADO_MENSAL;
  const maxV = Math.max(...data) * 1.15;
  const W = 480, H = 120, PL = 44, PR = 10, PT = 8, PB = 28;
  const cW = W - PL - PR, cH = H - PT - PB;
  const n = data.length;
  const barW = (cW / n) * 0.55;
  const gap  = cW / n;

  const yScale = v => PT + cH - (v / maxV) * cH;

  let bars = '', yLabels = '', xLabels = '';
  const ticks = [0, maxV * 0.25, maxV * 0.5, maxV * 0.75, maxV];
  ticks.forEach(v => {
    const y = yScale(v);
    yLabels += `<line x1="${PL}" y1="${y}" x2="${W-PR}" y2="${y}" stroke="#252529" stroke-width="1"/>`;
    yLabels += `<text x="${PL-4}" y="${y+3.5}" text-anchor="end" fill="#4A4A58" font-size="9" font-family="Barlow,sans-serif">${v>0?(v/1000).toFixed(v>=1000?0:1)+'k':'0'}</text>`;
  });

  // Current month highlight
  const hoje = 3; // Abril = index 3
  data.forEach((v, i) => {
    const x = PL + i * gap + (gap - barW) / 2;
    const barH = (v / maxV) * cH;
    const y = PT + cH - barH;
    const isCur = i === hoje;
    const isPos = v > 0;
    const col = isCur ? '#0DCFB0' : (v < 0 ? '#F55050' : '#0DCFB040');
    bars += `<rect x="${x}" y="${y}" width="${barW}" height="${barH}" fill="${col}" rx="2">
      <title>${MESES_LABELS[i]}: €${v.toLocaleString('pt-PT')}</title></rect>`;
    if (isCur) {
      bars += `<rect x="${x}" y="${y}" width="${barW}" height="2" fill="#0DCFB0" rx="1"/>`;
    }
    xLabels += `<text x="${x + barW/2}" y="${H - PB + 13}" text-anchor="middle" fill="${isCur?'#0DCFB0':'#4A4A58'}" font-size="9" font-family="Barlow,sans-serif" font-weight="${isCur?'600':'400'}">${MESES_LABELS[i]}</text>`;
  });

  // Average line
  const avg = data.reduce((a,b)=>a+b,0) / data.length;
  const avgY = yScale(avg);
  const avgLine = `<line x1="${PL}" y1="${avgY}" x2="${W-PR}" y2="${avgY}" stroke="#F5A623" stroke-width="1" stroke-dasharray="4,3"/>`;
  const avgLbl  = `<text x="${W-PR-2}" y="${avgY-3}" text-anchor="end" fill="#F5A623" font-size="8" font-family="Barlow,sans-serif">média</text>`;

  wrap.innerHTML = `
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block" xmlns="http://www.w3.org/2000/svg">
      ${yLabels}
      ${bars}
      ${avgLine}${avgLbl}
      <line x1="${PL}" y1="${PT}" x2="${PL}" y2="${PT+cH}" stroke="#32323A" stroke-width="1"/>
      <line x1="${PL}" y1="${PT+cH}" x2="${W-PR}" y2="${PT+cH}" stroke="#32323A" stroke-width="1"/>
      ${xLabels}
    </svg>
    <div style="display:flex;gap:16px;margin-top:6px">

function invLineRow(l, i) {
  const sub = l.qty * l.preco;
  const total = sub * (1 + IVA[l.taxa]);
  return `<tr id="inv-line-${i}">
    <td><input value="${l.desc}" placeholder="Descrição do serviço/produto" oninput="invLines[${i}].desc=this.value;updateInvPreview()"></td>
    <td><input type="number" value="${l.qty}" min="0.01" step="0.01" style="width:50px;text-align:right" oninput="invLines[${i}].qty=+this.value;updateInvPreview()"></td>
    <td><input type="number" value="${l.preco}" min="0" step="0.01" style="width:80px;text-align:right" oninput="invLines[${i}].preco=+this.value;updateInvPreview()"></td>
    <td><select style="background:transparent;border:none;color:var(--t1);font-family:var(--fb);font-size:11px;outline:none;cursor:pointer" onchange="invLines[${i}].taxa=this.value;updateInvPreview()">
      <option value="normal"    ${l.taxa==='normal'    ?'selected':''}>23% Normal</option>
      <option value="intermedio"${l.taxa==='intermedio'?'selected':''}>13% Intermédia</option>
      <option value="reduzido"  ${l.taxa==='reduzido'  ?'selected':''}>6% Reduzida</option>
      <option value="isento"    ${l.taxa==='isento'    ?'selected':''}>0% Isento</option>
    </select></td>
    <td style="text-align:right;font-size:11px">${fmt(sub)}</td>
    <td style="text-align:right;font-size:11px;color:var(--teal)">${fmt(total)}</td>
  </tr>`;
}

function addInvLine() {
  invLines.push({ desc:'', qty:1, preco:0, taxa:'normal' });
  renderNovaFatura($('content'));
}

function updateInvPreview() {
  const base = invLines.reduce((s,l)=>s+l.qty*l.preco,0);
  const iva  = invLines.reduce((s,l)=>s+(l.qty*l.preco*IVA[l.taxa]),0);
  const total = base + iva;
  const setTxt = (id,v) => { const el=$(id); if(el) el.textContent=v; };
  setTxt('inv-base',  fmt(base));
  setTxt('inv-iva',   fmt(iva));
  setTxt('inv-total', fmt(total));
  setTxt('prev-base', fmt(base));
  setTxt('prev-iva',  fmt(iva));
  setTxt('prev-total',fmt(total));
  const pc = $('prev-cliente'); if(pc) pc.textContent = invCliente||'— Cliente —';
  const pn = $('prev-nif');     if(pn) pn.textContent = 'NIF: ' + (invNIF||'—');
}

function emitirFatura() {
  const btn = document.querySelector('.btn-teal');
  if (!btn) return;
  const orig = btn.innerHTML;
  btn.innerHTML = '<span class="pulsing">A comunicar AT…</span>';
  btn.disabled = true;
  setTimeout(() => {
    btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="black" stroke-width="2"><path d="M1 6l4 4 6-6"/></svg> Fatura comunicada AT!';
    btn.style.background = 'var(--green)';
    setTimeout(() => {
      invLines = [{ desc:'', qty:1, preco:0, taxa:'normal' }];
      invCliente = ''; invNIF = '';
      btn.disabled = false;
      btn.innerHTML = orig;
      btn.style.background = '';
      goto('faturas');
    }, 2000);
  }, 1800);
}

function updateRetCalc() {
  const el = $('ret-result');

  const bruto = calcSalario || 2600;

  const ret = calcRetencao(bruto, calcDependentes, calcEstadoCivil);

  el.innerHTML = `

function submitDMR(btn) {

function exportSAFT(btn) {
  const orig = btn.innerHTML;
  btn.innerHTML = '<span class="pulsing">A gerar ficheiro XML…</span>';
  btn.disabled = true;
  setTimeout(()=>{
    btn.innerHTML = '✓ SAFT-PT gerado — Pronto para download';
    btn.style.background = 'var(--green)';
    btn.style.color = '#000';
    setTimeout(()=>{ btn.innerHTML=orig; btn.style.background=''; btn.style.color=''; btn.disabled=false; },2500);
  },1800);
}

function calcSalarioLiq(c, horasExtra=0) {
  const bruto = c.sal_base;
  const ss_t  = Math.round(bruto * SS.trabalhador);
  const ret   = calcRetencao(bruto, c.dependentes, c.ec);
  const extra = Math.round(horasExtra * (bruto / (HORAS_SEMANA * 4.33)) * (1 + HORA_EXTRA_1H_PERC));
  return { bruto, ss_t, ret, liq: bruto - ss_t - ret + extra, ss_e: Math.round(bruto * SS.empregador), custo: bruto + Math.round(bruto * SS.empregador), extra };
}

function verColaborador(id) {
  selectedColab = COLABORADORES.find(c=>c.id===id);
  if(!selectedColab) return;
  goto('admissao');
}

function calcAdmSim() {
  const el = document.getElementById('adm-sim');
  if (!el) return;
  const sal = admData.sal_base || 0;
  if (!sal) { el.innerHTML = ''; return; }
  const modo = admData.sa_modo || 'dinheiro';
  const dias = admData.dias_trab || 22;
  const sub_alim = modo==='nao' ? 0 : Math.round((modo==='cartao' ? SUB_ALIM_CARTAO : SUB_ALIM_DINHEIRO) * dias);
  const ss_t = Math.round(sal * SS.trabalhador);
  const ec   = admData.ec || 'solteiro';
  const dep  = admData.dependentes || 0;
  const ret  = calcRetencao(sal, dep, ec);
  const liq  = sal + sub_alim - ss_t - ret;
  const ss_e = Math.round(sal * SS.empregador);
  const custo= sal + ss_e + sub_alim;
  el.innerHTML = `
    <div class="calc-row"><span class="calc-row-l">Salário base</span><span class="calc-row-v">${fmt(sal)}</span></div>
    <div class="calc-row"><span class="calc-row-l">Subsídio alimentação</span><span class="calc-row-v">${fmt(sub_alim)}</span></div>
    <div class="calc-row"><span class="calc-row-l">SS Trabalhador (11%)</span><span class="calc-row-v" style="color:var(--red)">− ${fmt(ss_t)}</span></div>
    <div class="calc-row"><span class="calc-row-l">Retenção IRS (tabela)</span><span class="calc-row-v" style="color:var(--red)">− ${fmt(ret)}</span></div>
    <div class="calc-row"><span style="color:var(--green)">Salário Líquido</span><span>${fmt(liq)}</span></div>
    <div class="calc-row" style="margin-top:8px"><span class="calc-row-l">Custo empresa (+ SS 23,75%)</span><span class="calc-row-v">${fmt(custo)}</span></div>`;
}

function admitirColaborador() {
  const btn = document.getElementById('adm-confirm-btn') || document.querySelector('#content .btn-teal');

}

              return `<div style="width:20px;height:22px;border-radius:3px;background:${bg};border:1px solid ${bc};display:flex;align-items:center;justify-content:center;font-size:8px;color:${is_fim?'var(--t3)':'var(--t2)'}">${tc}</div>`;
            }).join('')}
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function triggerOCRUpload() {

}

function handleOCRFile(e) {
  const file = e.target.files[0];
  if(!file) return;
  loadOCRFile(file);
}

function handleOCRDrop(e) {
  e.preventDefault();
  document.getElementById('ocr-drop-zone').classList.remove('drag');
  const file = e.dataTransfer.files[0];
  if(file) loadOCRFile(file);
}

function loadOCRFile(file) {
  // Reset state
  ocrState = { base64: '', mimeType: '', isPdf: false, loaded: false };

  const isPdf = file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf');
  ocrState.isPdf     = isPdf;
  ocrState.mimeType  = isPdf ? 'application/pdf' : (file.type || 'image/jpeg');

  const reader = new FileReader();
  reader.onload = function(ev) {
    const raw    = ev.target.result;
    const b64    = raw.split(',')[1] || '';
    ocrState.base64  = b64;
    ocrState.loaded  = b64.length > 0;

    const prev    = document.getElementById('ocr-img-preview');
    const zone    = document.getElementById('ocr-drop-zone');
    const prevArea= document.getElementById('ocr-preview-area');
    if (!prev || !prevArea) return;

    if (!isPdf && file.type.startsWith('image/')) {
      prev.innerHTML = '<img src="' + raw + '" style="max-width:100%;max-height:260px;border-radius:var(--r1);display:block">';
    } else {
      const kb = (file.size / 1024).toFixed(0);
      prev.innerHTML =
        '<div style="padding:24px;text-align:center">'
        + '<svg width="36" height="36" viewBox="0 0 36 36" fill="none" stroke="var(--teal)" stroke-width="1.5" style="display:block;margin:0 auto 10px">'
        + '<rect x="4" y="2" width="28" height="32" rx="3"/><path d="M11 11h14M11 17h14M11 23h9"/>'
        + '</svg>'
        + '<div style="font-size:12px;font-weight:500;color:var(--t1)">' + file.name + '</div>'
        + '<div style="font-size:10px;color:var(--t3);margin-top:4px">' + kb + ' KB · PDF</div>'
        + '</div>';
    }
    zone.style.display  = 'none';
    prevArea.style.display = 'block';
  };
  reader.onerror = function() {
    console.error('FileReader error');
  };
  reader.readAsDataURL(file);
}

async function processOCR() {
  const btn    = document.getElementById('ocr-btn');
  const status = document.getElementById('ocr-status');
  const form   = document.getElementById('ocr-form');
  if (!btn || !status || !form) return;

  // Guard — file must be loaded
  if (!ocrState.loaded || !ocrState.base64) {
    status.innerHTML = errBox('Nenhum ficheiro carregado. Carregue uma imagem ou PDF primeiro.');
    status.style.display = 'block';
    return;
  }

  btn.innerHTML = '<span class="pulsing">A analisar com Claude Vision…</span>';
  btn.disabled  = true;
  status.innerHTML = typingBox('Claude Vision está a ler o documento…');
  status.style.display = 'block';
  form.style.display   = 'none';

  const PROMPT =
    'You are a Portuguese accounting assistant. Extract all data from this invoice/receipt document. '
    + 'Reply ONLY with valid JSON — no markdown, no backticks, no extra text. '
    + 'Use exactly this structure: '
    + '{"fornecedor":"","nif_fornecedor":"","num_documento":"","data":"YYYY-MM-DD",'
    + '"tipo":"Fatura","linhas":[{"descricao":"","quantidade":1,"preco_unit":0.00,"taxa_iva":"normal"}],'
    + '"base_tributavel":0.00,"total_iva":0.00,"total":0.00} '
    + 'For taxa_iva use one of: normal (23%), intermedio (13%), reduzido (6%), isento (0%). '
    + 'Numbers must be plain floats. Empty fields use empty string or 0.';

  // Build content block — images use type:image, PDFs use type:document
  const mediaBlock = ocrState.isPdf
    ? { type: 'document', source: { type: 'base64', media_type: 'application/pdf',   data: ocrState.base64 } }
    : { type: 'image',    source: { type: 'base64', media_type: ocrState.mimeType,   data: ocrState.base64 } };

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model:      'claude-sonnet-4-6',
        max_tokens: 1024,
        messages: [{
          role:    'user',
          content: [mediaBlock, { type: 'text', text: PROMPT }]
        }]
      })
    });

    if (!res.ok) {
      const errBody = await res.json().catch(() => ({}));
      const msg = errBody.error ? errBody.error.message : ('HTTP ' + res.status);
      throw new Error(msg);
    }

    const data  = await res.json();
    const raw   = (data.content || []).map(function(c) { return c.text || ''; }).join('')
                    .replace(/```json|```/g, '').trim();

    let parsed;
    try {
      parsed = JSON.parse(raw);
    } catch(e) {
      // Try to extract JSON from response
      const match = raw.match(/\{[\s\S]+\}/);
      if (match) { try { parsed = JSON.parse(match[0]); } catch(e2) { parsed = null; } }
      if (!parsed) throw new Error('A IA não conseguiu extrair dados estruturados. Tente uma imagem mais nítida e com boa iluminação.');
    }

    // Populate form
    status.style.display = 'none';
    form.style.display   = 'block';

    function setVal(id, v) {
      const el = document.getElementById(id);
      if (el && v !== undefined && v !== null && v !== '') {
        el.value = String(v);
        el.classList.add('auto');
      }
    }
    setVal('ocr-fornecedor', parsed.fornecedor);
    setVal('ocr-nif-forn',   parsed.nif_fornecedor);
    setVal('ocr-num-doc',    parsed.num_documento);
    setVal('ocr-data',       parsed.data);

    const tipoEl = document.getElementById('ocr-tipo');
    if (tipoEl && parsed.tipo) {
      const tipoMap = {'fatura':'Fatura','fatura simplificada':'Fatura Simplificada','nota de crédito':'Nota de Crédito','recibo':'Recibo','nota de débito':'Nota de Débito'};
      tipoEl.value = tipoMap[(parsed.tipo||'').toLowerCase()] || 'Fatura';
    }

    // Line items
    const linhasWrap = document.getElementById('ocr-linhas-wrap');
    if (linhasWrap && Array.isArray(parsed.linhas) && parsed.linhas.length > 0) {
      const rows = parsed.linhas.map(function(l) {
        const desc  = (l.descricao  || '').replace(/"/g, '&quot;');
        const qty   = l.quantidade  || 1;
        const price = l.preco_unit  || 0;
        const taxa  = l.taxa_iva    || 'normal';
        return '<div style="display:grid;grid-template-columns:3fr 1fr 1fr 1fr;gap:6px;margin-bottom:6px">'
          + '<input class="ocr-field auto" value="' + desc  + '" placeholder="Descrição">'
          + '<input class="ocr-field auto" type="number" value="' + qty   + '" style="width:100%" placeholder="Qtd">'
          + '<input class="ocr-field auto" type="number" value="' + price + '" step="0.01" style="width:100%" placeholder="€">'
          + '<select class="ocr-field auto">'
          + '<option value="normal"'     + (taxa==='normal'    ?' selected':'') + '>23% Normal</option>'
          + '<option value="intermedio"' + (taxa==='intermedio'?' selected':'') + '>13% Intermédia</option>'
          + '<option value="reduzido"'   + (taxa==='reduzido'  ?' selected':'') + '>6% Reduzida</option>'
          + '<option value="isento"'     + (taxa==='isento'    ?' selected':'') + '>0% Isento</option>'
          + '</select></div>';
      }).join('');
      linhasWrap.innerHTML = '<div class="card-title" style="margin-top:12px">Linhas (' + parsed.linhas.length + ')</div>' + rows;
    }

    // Totals
    const totaisEl = document.getElementById('ocr-totais');
    if (totaisEl) {
      const base = parsed.base_tributavel || 0;
      const iva  = parsed.total_iva       || 0;
      const tot  = parsed.total           || (base + iva);
      totaisEl.innerHTML =
        '<div class="calc-row"><span class="calc-row-l">Base tributável</span><span class="calc-row-v">' + fmt(base) + '</span></div>'
        + '<div class="calc-row"><span class="calc-row-l">IVA</span><span class="calc-row-v" style="color:var(--amber)">' + fmt(iva) + '</span></div>'
        + '<div class="calc-row"><span>Total</span><span>' + fmt(tot) + '</span></div>';
    }

    btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="black" stroke-width="2"><path d="M1 6l4 4 6-6"/></svg> Analisado com sucesso!';
    btn.style.background = 'var(--green)';
    btn.style.color = '#000';
    setTimeout(function() {
      btn.style.background = ''; btn.style.color = '';
      btn.innerHTML = 'Analisar novamente';
      btn.disabled  = false;
    }, 2500);

  } catch(err) {
    status.style.display = 'block';
    form.style.display   = 'none';
    status.innerHTML = errBox(err.message || 'Erro desconhecido. Tente novamente.');
    btn.innerHTML = 'Tentar novamente';
    btn.disabled  = false;
  }
}

function typingBox(msg) {
  return '<div style="padding:20px;text-align:center">'
    + '<div class="doc-typing" style="justify-content:center;margin-bottom:10px"><span></span><span></span><span></span></div>'
    + '<div style="font-size:12px;color:var(--teal)">' + msg + '</div></div>';
}
function errBox(msg) {
  return '<div style="padding:20px;text-align:center">'
    + '<svg width="28" height="28" viewBox="0 0 28 28" fill="none" stroke="var(--red)" stroke-width="1.5" style="display:block;margin:0 auto 10px">'
    + '<circle cx="14" cy="14" r="12"/><path d="M14 9v6M14 17v2"/></svg>'
    + '<div style="font-size:12px;color:var(--red);line-height:1.6">' + msg + '</div>'
    + '<div style="font-size:10px;color:var(--t3);margin-top:8px">Certifique-se de que o documento é legível e tente novamente.</div></div>';
}

function resetOCR() { ocrState={uploading:false,processing:false,result:null,file:null}; rr(); }

  const btn=event.target;

  setTimeout(()=>{btn.innerHTML='✓ Despesa guardada!';btn.style.background='var(--green)';btn.style.color='#000';
    setTimeout(()=>{goto('faturas');},1800);},1200);
}

<script>
/* ════════════════════════════
   DOC — AI ASSISTANT

(function(){
  var DOC_OPEN   = false;
  var DOC_BUSY   = false;
  var DOC_HIST   = [];
  var DOC_CTX    = {
    systemPrompt: `You are Doc, an expert AI assistant embedded in STRATA — a Portuguese business OS. You are a specialist in Portuguese tax law and accounting. You know: IVA (CIVA), IRC (CIRC), IRS (CIRS), Segurança Social (CRCSPSS), SNC (Sistema de Normalização Contabilística), SAFT-PT, AT (Autoridade Tributária), Portal das Finanças, e-Fatura, DMR, IES, Modelo 22, prazos fiscais, regras de dedutibilidade, tributações autónomas (Art.º 88.º CIRC), tabelas de retenção na fonte 2025, escalões IRC/IRS 2025/2026, e Código do Trabalho português. Answer in the same language the user writes in (Portuguese or English). Be helpful, precise, and cite the relevant legal article when applicable.`,

  };

  /* Context label & quick chips per module */
  var CTX_DATA = {
    'default':      { label:'Dashboard', greeting:'Olá! Sou o Doc, o teu assistente fiscal. Posso ajudar com IVA, IRC, retenções, folha de salários, prazos AT ou qualquer dúvida contabilística. O que precisas?', chips:['Quando é o prazo do IVA?','Como calcular IRC?','Taxa retenção na fonte','Subsídio de férias e Natal'] },
    'dashboard':    { label:'Dashboard', greeting:'Olá! Sou o Doc. Estou a ver o teu resumo financeiro. Tens alguma questão sobre IVA a pagar, prazos AT ou indicadores fiscais?', chips:['IVA a entregar?','Próximo prazo AT?','Como calcular IRC?','SS — que taxa?'] },
    'calendario':   { label:'Calendário Fiscal', greeting:'Aqui estão os prazos AT de 2026. Podes perguntar sobre qualquer prazo fiscal, o que acontece se falhar, ou como preparar cada declaração.', chips:['O que é a DMR?','Quando entregar o Modelo 22?','Prazo IES 2026?','Penalidade por atraso?'] },
    'faturas':      { label:'Faturas & Recibos', greeting:'Posso ajudar com faturação portuguesa — e-Fatura, tipos de documentos (FT, FS, NC), taxas de IVA, ou regras de comunicação à AT.', chips:['Diferença FT e FS?','Prazo comunicar AT?','Como anular fatura?','IVA isento — quando?'] },
    'nova-fatura':  { label:'Nova Fatura', greeting:'Vamos criar uma fatura. Preciso que confirms: os dados do cliente, a taxa de IVA correcta para o serviço, e se é uma Fatura (FT) ou Fatura Simplificada (FS).', chips:['Taxa IVA correta?','Quando usar FS?','Obrigação comunicar AT?','NIF obrigatório?'] },
    'iva':          { label:'IVA', greeting:'IVA — Imposto sobre o Valor Acrescentado. Posso explicar o apuramento, as taxas (23%, 13%, 6%, isento), regras de dedutibilidade (Art.º 21.º CIVA), ou como preencher a Declaração Periódica.', chips:['Como apurar IVA?','IVA combustível?','Regime de caixa?','Taxas Açores/Madeira?'] },
    'irc':          { label:'IRC / IRS', greeting:'IRC e IRS Categoria B. Posso ajudar com: cálculo do lucro tributável, taxas (17%/21%), pagamentos por conta, tributações autónomas (Art.º 88.º), ou IRS de trabalhadores independentes.', chips:['Taxa IRC PME?','O que são tributações autónomas?','PPC — como calcular?','Gastos não aceites?'] },
    'retencoes':    { label:'Retenções na Fonte', greeting:'Retenções na Fonte — Categoria A, B, E, F, G. Posso calcular a retenção exacta para qualquer salário ou rendimento, com base na tabela AT 2025.', chips:['Calcular retenção?','Taxa Cat. B serviços?','DMR — o que é?','Retenção dividendos?'] },
    'salarios':     { label:'Salários & SS', greeting:'Segurança Social e processamento de salários. Taxas: 23,75% empregador + 11% trabalhador. Posso ajudar com folha de vencimentos, subsídios legais ou custo total do empregador.', chips:['Custo total empregador?','Subsidio natal — quando?','SMN 2025?','Como processar salário?'] },
    'dmr':          { label:'DMR', greeting:'DMR — Declaração Mensal de Remunerações. Obrigatória até ao dia 10 do mês seguinte. Posso ajudar com o preenchimento, os códigos de rendimento ou a submissão no Portal das Finanças.', chips:['O que é a DMR?','Códigos rendimento?','Prazo e penalidades?','Formato XML?'] },
    'relatorios':   { label:'Relatórios & SAFT', greeting:'SAFT-PT, Demonstração de Resultados, Balanço e Modelo 22. Posso explicar a estrutura do SAFT, os campos do Modelo 22, ou como preparar as contas anuais em SNC.', chips:['O que é SAFT-PT?','Quadros Modelo 22?','IES — o que inclui?','SNC — classes contabilísticas?'] },
    'contas':       { label:'Contas & Bancos', greeting:'Reconciliação bancária e contabilidade de Caixa (Classe 1 SNC). Posso ajudar com lançamentos contabilísticos, codificação SNC ou integração com o teu banco.', chips:['Como reconciliar?','Conta 11 SNC?','Lançamento recebimento?','Conta corrente clientes?'] }
  };

  function docGetCtx(){
    var key = 'default';
    
    if(typeof pg !== 'undefined') key = pg;
    else key = 'default';
    
    return CTX_DATA[key] || CTX_DATA['default'];
  }

  function docUpdateCtx(){
    var ctx = docGetCtx();
    var lbl = document.getElementById('doc-context-label');
    if(lbl) lbl.textContent = ctx.label;
    var chips = document.getElementById('doc-chips');
    if(!chips) return;
    chips.innerHTML = ctx.chips.map(function(c){
      return '<button class="doc-chip" onclick="docChip(this)">'+c+'</button>';
    }).join('');
  }

  window.docToggle = function(){
    DOC_OPEN = !DOC_OPEN;
    var fab   = document.getElementById('doc-fab');
    var panel = document.getElementById('doc-panel');
    if(fab)   fab.classList.toggle('open', DOC_OPEN);
    if(panel) panel.classList.toggle('open', DOC_OPEN);
    if(DOC_OPEN){
      docUpdateCtx();
      if(DOC_HIST.length === 0) docGreet();
      setTimeout(function(){ var i=document.getElementById('doc-inp'); if(i) i.focus(); }, 250);
    }
  };

  window.docChip = function(el){
    var t = el.textContent;
    document.getElementById('doc-inp').value = t;
    docSend();
  };

  window.docKey = function(e){
    if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); docSend(); }
  };

  window.docResize = function(el){
    el.style.height='auto';
    el.style.height = Math.min(el.scrollHeight, 88)+'px';
  };

  function docGreet(){
    var ctx = docGetCtx();
    docAddMsg('doc', ctx.greeting, false);
  }

  function docAddMsg(role, text, append){
    var msgs = document.getElementById('doc-messages');
    if(!msgs) return;
    if(append && msgs.lastElementChild && msgs.lastElementChild.getAttribute('data-role')==='doc'){
      var b = msgs.lastElementChild.querySelector('.doc-bubble');
      if(b){ b.innerHTML = docFormat(text); scrollDoc(); return; }
    }
    var d = document.createElement('div');
    d.className = 'doc-msg ' + (role==='user'?'user':'');
    d.setAttribute('data-role', role);
    var avClass = role==='user' ? 'doc-av-user' : 'doc-av-doc';
    var avTxt   = role==='user' ? 'YOU' : 'DOC';
    d.innerHTML =
      '<div class="doc-msg-av '+avClass+'">'+avTxt+'</div>'+
      '<div class="doc-bubble doc-bubble-'+(role==='user'?'user':'doc')+'">'+docFormat(text)+'</div>';
    msgs.appendChild(d);
    scrollDoc();
  }

  function docFormat(txt){
    return txt
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
      .replace(/`([^`]+)`/g,'<code>$1</code>')
      .replace(/_(.*?)_/g,'<em>$1</em>')
      .replace(/\n/g,'<br>');
  }

  function docTyping(show){
    var msgs = document.getElementById('doc-messages');
    if(!msgs) return;
    var existing = document.getElementById('doc-typing-indicator');
    if(show && !existing){
      var d = document.createElement('div');
      d.id = 'doc-typing-indicator';
      d.className = 'doc-msg';
      d.setAttribute('data-role','doc');
      d.innerHTML = '<div class="doc-msg-av doc-av-doc">DOC</div><div class="doc-bubble doc-bubble-doc"><div class="doc-typing"><span></span><span></span><span></span></div></div>';
      msgs.appendChild(d);
      scrollDoc();
    } else if(!show && existing){
      existing.remove();
    }
  }

  function scrollDoc(){
    var m = document.getElementById('doc-messages');
    if(m) m.scrollTop = m.scrollHeight;
  }

  function docBuildSystemPrompt(){
    var ctx = docGetCtx();
    var base = DOC_CTX.systemPrompt;
    var page = ctx.label;
    return base + '\n\nThe user is currently on the **'+page+'** section. Tailor your answer to that context. Be concise — aim for 2-4 sentences unless the question needs detail. Use **bold** for key terms, `code` for values/rates/fields.';
  }

  window.docSend = async function(){
    if(DOC_BUSY) return;
    var inp = document.getElementById('doc-inp');
    var msg = (inp.value||'').trim();
    if(!msg) return;
    inp.value=''; inp.style.height='auto';

    docAddMsg('user', msg, false);
    DOC_HIST.push({ role:'user', content: msg });
    DOC_BUSY = true;
    document.getElementById('doc-send').disabled = true;
    document.getElementById('doc-inp').disabled  = true;

    docTyping(true);

    try {
      var body = {
        model: 'claude-sonnet-4-6',
        max_tokens: 600,
        system: docBuildSystemPrompt(),
        messages: DOC_HIST.slice(-12)
      };

      var res = await fetch('https://api.anthropic.com/v1/messages', {
        method:'POST',
        headers:{ 'Content-Type':'application/json' },
        body: JSON.stringify(body)
      });

      if(!res.ok){ throw new Error('API '+res.status); }

      var data = await res.json();
      var reply = (data.content||[]).map(function(c){ return c.text||''; }).join('');

      docTyping(false);
      docAddMsg('doc', reply, false);
      DOC_HIST.push({ role:'assistant', content: reply });
      docUpdateCtx();

    } catch(err){
      docTyping(false);
      docAddMsg('doc', 'Sorry, I had trouble connecting. Please try again.', false);
    }

    DOC_BUSY = false;
    document.getElementById('doc-send').disabled = false;
    var di = document.getElementById('doc-inp');
    di.disabled = false;
    di.focus();
  };

  /* Auto-update context label when page changes */
  var _origGoto = window.goto;
  if(typeof _origGoto === 'function'){
    window.goto = function(page){
      _origGoto(page);
      if(DOC_OPEN) setTimeout(docUpdateCtx, 50);
    };
  }
})();
</script>
</body>
</html>
