<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>STRATA — Marketing · CRM · Revenue</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07080A;--s1:#0C0D10;--s2:#121418;--s3:#181B1F;--s4:#1E2126;--s5:#252A30;
  --b1:#22262C;--b2:#2E343C;--b3:#3A424C;
  --t1:#EEF0F4;--t2:#7A8494;--t3:#3E4652;
  --teal:#00D4B0;--teal2:#00A88A;--tb:rgba(0,212,176,.08);--tl:rgba(0,212,176,.14);
  --amber:#F5A623;--ab:rgba(245,166,35,.08);
  --red:#F04F5A;--rb:rgba(240,79,90,.08);
  --blue:#4E9CF5;--bb:rgba(78,156,245,.08);
  --green:#28C87A;--gb:rgba(40,200,122,.08);
  --purple:#9B6BF2;--pb:rgba(155,107,242,.08);
  --pink:#F0508C;--pkb:rgba(240,80,140,.08);
  --fh:'Barlow Condensed',sans-serif;
  --fb:'Barlow',sans-serif;
  --r1:6px;--r2:10px;--r3:14px;--r4:18px;
}
html,body{height:100%;background:var(--bg);color:var(--t1);font-family:var(--fb);font-size:13px;overflow:hidden}
#root{display:flex;height:100vh}

/* ── SIDEBAR ── */
.sb{width:218px;min-width:218px;background:var(--s1);border-right:1px solid var(--b1);display:flex;flex-direction:column}
.sb-logo{padding:16px 14px 14px;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:9px;flex-shrink:0}
.sb-name{font-family:var(--fh);font-size:17px;font-weight:800;letter-spacing:2px}
.sb-sub{font-size:8px;color:var(--t3);letter-spacing:1.2px;text-transform:uppercase;margin-top:1px}
.sb-nav{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:8px}
.sb-nav::-webkit-scrollbar{width:0}
.sb-mod{padding:14px 12px 3px;font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:1.8px;display:flex;align-items:center;gap:7px}
.sb-mod::before{content:'';flex:1;height:1px;background:var(--b1)}
.sb-item{display:flex;align-items:center;gap:8px;padding:7px 10px;margin:1px 6px;border-radius:var(--r1);cursor:pointer;color:var(--t2);font-size:12px;border:1px solid transparent;background:transparent;width:calc(100% - 12px);text-align:left;font-family:var(--fb);letter-spacing:.3px;transition:all .12s;white-space:nowrap}
.sb-item:hover{background:var(--s3);color:var(--t1)}
.sb-item.on{background:var(--tl);color:var(--teal);font-weight:500;border-color:rgba(0,212,176,.12)}
.sb-item svg{flex-shrink:0;opacity:.7}
.sb-item.on svg{opacity:1}
.sb-bdg{margin-left:auto;font-size:9px;padding:1px 6px;border-radius:6px;font-weight:700;background:var(--teal);color:#000}
.sb-bdg-r{background:var(--rb);color:var(--red);border:1px solid rgba(240,79,90,.2)}
.sb-bot{flex-shrink:0;padding:10px 12px;border-top:1px solid var(--b1);display:flex;align-items:center;gap:8px}
.sb-av{width:28px;height:28px;border-radius:50%;background:var(--tl);border:1px solid var(--teal);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--teal);font-family:var(--fh);letter-spacing:.5px;flex-shrink:0}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:52px;background:var(--s1);border-bottom:1px solid var(--b1);display:flex;align-items:center;padding:0 22px;gap:12px;flex-shrink:0}
.tb-mod{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:3px 10px;border-radius:4px}
.tb-mkt{background:rgba(0,212,176,.1);color:var(--teal)}
.tb-crm{background:rgba(78,156,245,.1);color:var(--blue)}
.tb-rev{background:rgba(40,200,122,.1);color:var(--green)}
.tb-title{font-family:var(--fh);font-size:16px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase}
.tb-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.content{flex:1;overflow-y:auto;padding:22px}
.content::-webkit-scrollbar{width:3px}
.content::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 16px;border-radius:var(--r1);font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:var(--fb);letter-spacing:.4px;transition:all .12s;white-space:nowrap;text-decoration:none}
.btn-teal{background:var(--teal);color:#000}.btn-teal:hover{background:var(--teal2)}
.btn-ghost{background:transparent;color:var(--t2);border:1px solid var(--b2)}.btn-ghost:hover{background:var(--s3);color:var(--t1)}
.btn-blue{background:var(--bb);color:var(--blue);border:1px solid rgba(78,156,245,.2)}.btn-blue:hover{background:rgba(78,156,245,.18)}
.btn-ok{background:var(--gb);color:var(--green);border:1px solid rgba(40,200,122,.2)}
.btn-warn{background:var(--ab);color:var(--amber);border:1px solid rgba(245,166,35,.2)}
.btn-danger{background:var(--rb);color:var(--red);border:1px solid rgba(240,79,90,.2)}
.btn-sm{padding:4px 11px;font-size:11px}.btn-xs{padding:2px 8px;font-size:10px}

/* ── INPUTS ── */
.inp{background:var(--s3);border:1px solid var(--b1);border-radius:var(--r1);padding:7px 11px;font-size:12px;color:var(--t1);font-family:var(--fb);outline:none;transition:border-color .12s;width:100%}
.inp:focus{border-color:var(--teal)}.inp::placeholder{color:var(--t3)}
textarea.inp{resize:vertical;min-height:72px;line-height:1.5}
select.inp{cursor:pointer}.select.inp option{background:var(--s3)}
input[type="date"].inp,input[type="range"].inp{color-scheme:dark}
input[type="range"]{accent-color:var(--teal);width:100%;cursor:pointer}

/* ── CARDS ── */
.card{background:var(--s2);border:1px solid var(--b1);border-radius:var(--r3);padding:18px}
.card2{background:var(--s3);border:1px solid var(--b1);border-radius:var(--r2);padding:13px}
.card-title{font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px}

/* ── GRIDS ── */
.g2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
.g3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
.g4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}

/* ── KPI CARD ── */
.kpi{background:var(--s2);border:1px solid var(--b1);border-radius:var(--r2);padding:16px;position:relative;overflow:hidden}
.kpi-lbl{font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:6px}
.kpi-val{font-family:var(--fh);font-size:26px;font-weight:800;letter-spacing:-.5px;margin-bottom:4px;line-height:1}
.kpi-chg{font-size:10px;font-weight:600}
.up{color:var(--green)}.down{color:var(--red)}.neu{color:var(--t2)}
.kpi-bar{height:2px;border-radius:2px;margin-top:8px;background:var(--b2)}
.kpi-bar-fill{height:100%;border-radius:2px}

/* ── BADGES ── */
.bdg{display:inline-flex;align-items:center;gap:3px;font-size:9px;padding:2px 7px;border-radius:4px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap}
.bdg-t{background:var(--tl);color:var(--teal);border:1px solid rgba(0,212,176,.15)}
.bdg-g{background:var(--gb);color:var(--green)}
.bdg-a{background:var(--ab);color:var(--amber)}
.bdg-r{background:var(--rb);color:var(--red)}
.bdg-b{background:var(--bb);color:var(--blue)}
.bdg-p{background:var(--pb);color:var(--purple)}
.bdg-k{background:var(--pkb);color:var(--pink)}
.bdg-gr{background:var(--s4);color:var(--t2)}
.bdot{width:5px;height:5px;border-radius:50%;background:currentColor;display:inline-block}

/* ── SEC HEADER ── */
.sec-hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap}
.sec-title{font-family:var(--fh);font-size:20px;font-weight:800;letter-spacing:1px;text-transform:uppercase}
.sec-sub{font-size:11px;color:var(--t2);margin-top:3px}

/* ── TABLE ── */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:8px 12px;color:var(--t3);font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;border-bottom:1px solid var(--b1);white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid var(--b1);color:var(--t2);vertical-align:middle}
td.hi{color:var(--t1);font-weight:500}
tr:last-child td{border:none}
tr:hover td{background:var(--s3)}

/* ── TABS ── */
.tab-bar{display:flex;background:var(--s2);border-radius:var(--r1);padding:3px;width:fit-content;margin-bottom:16px;border:1px solid var(--b1);gap:0}
.tab-btn{padding:5px 14px;border-radius:4px;font-size:11px;font-weight:500;cursor:pointer;color:var(--t2);border:none;background:transparent;font-family:var(--fb);letter-spacing:.4px;transition:all .12s;text-transform:uppercase;white-space:nowrap}
.tab-btn.on{background:var(--s4);color:var(--t1)}

/* ── ROWS ── */
.hrow{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--b1);transition:background .1s}
.hrow:hover{background:var(--s3);border-radius:var(--r1);padding-left:4px}
.hrow:last-child{border:none}
.srow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--b1);font-size:12px}
.srow:last-child{border:none}

/* ── FIELD ── */
.fld{margin-bottom:10px}
.fld label{font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:4px}
.fld-row{display:grid;gap:10px}

/* ── ALERTS ── */
.alert{padding:10px 14px;border-radius:var(--r1);font-size:12px;line-height:1.5;margin-bottom:12px;display:flex;gap:10px;align-items:flex-start}
.alert-info{background:rgba(0,212,176,.06);border:1px solid rgba(0,212,176,.15);color:var(--teal)}
.alert-warn{background:var(--ab);border:1px solid rgba(245,166,35,.2);color:var(--amber)}

/* ── PROGRESS ── */
.prog{height:4px;background:var(--s4);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;background:var(--teal)}

/* ── SPARKLINE ── */
.spark{display:flex;align-items:flex-end;gap:2px;height:32px}
.spk-bar{flex:1;border-radius:1px 1px 0 0;min-height:2px;background:var(--s5)}
.spk-bar.hi{background:var(--teal)}

/* ── PIPELINE KANBAN ── */
.pipeline{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px;align-items:flex-start}
.pipeline::-webkit-scrollbar{height:3px}
.pipeline::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
.pipe-col{min-width:210px;flex-shrink:0;background:var(--s2);border:1px solid var(--b1);border-radius:var(--r3);display:flex;flex-direction:column;max-height:calc(100vh - 160px)}
.pipe-head{padding:12px 14px 10px;border-bottom:1px solid var(--b1);flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.pipe-name{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px}
.pipe-count{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;background:var(--s4);color:var(--t2)}
.pipe-body{padding:8px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:6px}
.pipe-body::-webkit-scrollbar{width:0}
.deal-card{background:var(--s3);border:1px solid var(--b1);border-radius:var(--r2);padding:11px;cursor:pointer;transition:all .12s;position:relative}
.deal-card:hover{border-color:var(--b3);background:var(--s4)}
.deal-card.hot{border-color:rgba(0,212,176,.25)}
.deal-val{font-family:var(--fh);font-size:15px;font-weight:700;letter-spacing:-.3px;margin-bottom:2px}
.deal-co{font-size:11px;font-weight:500;color:var(--t1);margin-bottom:4px}
.deal-meta{font-size:10px;color:var(--t3)}
.deal-age{position:absolute;top:9px;right:9px;font-size:9px;color:var(--t3)}

/* ── CONTACT CARD ── */
.contact-card{background:var(--s2);border:1px solid var(--b1);border-radius:var(--r2);padding:14px;cursor:pointer;transition:all .12s;display:flex;align-items:center;gap:12px}
.contact-card:hover{border-color:var(--b2)}
.contact-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-size:13px;font-weight:700;flex-shrink:0}

/* ── CAMPAIGN CARD ── */
.camp-card{background:var(--s2);border:1px solid var(--b1);border-radius:var(--r3);overflow:hidden;transition:border-color .15s;cursor:pointer}
.camp-card:hover{border-color:var(--b2)}
.camp-thumb{width:100%;height:80px;display:flex;align-items:center;justify-content:center}
.camp-info{padding:12px}

/* ── FUNNEL ── */
.funnel-bar{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.funnel-track{flex:1;height:28px;background:var(--s4);border-radius:4px;overflow:hidden;position:relative}
.funnel-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:10px;font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden}

/* ── ACTIVITY ── */
.act-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--b1)}
.act-item:last-child{border:none}
.act-dot{width:8px;height:8px;border-radius:50%;background:var(--teal);margin-top:4px;flex-shrink:0;box-shadow:0 0 0 3px rgba(0,212,176,.1)}
.act-time{font-size:10px;color:var(--t3);white-space:nowrap}

/* ── MRR CHART ── */
.mrr-legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:8px}
.mrr-legend-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--t2)}
.mrr-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}

/* ── MISC ── */
hr{border:none;border-top:1px solid var(--b1);margin:14px 0}
.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb14{margin-bottom:14px}.mb16{margin-bottom:16px}
.mt8{margin-top:8px}.mt12{margin-top:12px}

/* ── AI WRITING ── */
.ai-gen-area{background:var(--s3);border:1px solid var(--b1);border-radius:var(--r2);padding:14px;min-height:80px;font-size:12.5px;line-height:1.75;color:var(--t1)}
.ai-gen-area strong{color:var(--teal)}

/* ── TOGGLE ── */
.tog{width:34px;height:18px;border-radius:9px;background:var(--b2);border:none;cursor:pointer;position:relative;flex-shrink:0;transition:background .2s}
.tog::after{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:var(--t2);transition:all .2s}
.tog.on{background:var(--teal)}.tog.on::after{left:18px;background:#000}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.pulsing{animation:pulse 1s ease-in-out infinite}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .2s ease forwards}

/* ── Creative Studio ── */
.studio-tabs{display:flex;gap:0;border-bottom:1px solid var(--b1);margin-bottom:18px}
.studio-tab-btn{padding:9px 18px;font-size:12px;font-weight:500;cursor:pointer;color:var(--t2);border:none;background:transparent;font-family:var(--fb);letter-spacing:.3px;transition:all .12s;border-bottom:2px solid transparent;position:relative;bottom:-1px}
.studio-tab-btn:hover{color:var(--t1)}
.studio-tab-btn.on{color:var(--teal);border-bottom-color:var(--teal)}
.studio-tab-cnt{display:inline-flex;align-items:center;justify-content:center;min-width:16px;height:16px;border-radius:8px;font-size:9px;font-weight:700;background:var(--teal);color:#000;padding:0 4px;margin-left:5px;vertical-align:middle}

.studio-layout{display:grid;grid-template-columns:340px 1fr;gap:16px;align-items:start}
.studio-left{background:var(--s2);border:1px solid var(--b1);border-radius:var(--r3);padding:16px;position:sticky;top:0;max-height:calc(100vh - 120px);overflow-y:auto}
.studio-left::-webkit-scrollbar{width:2px}
.studio-left::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
.studio-right{min-height:300px}
.studio-section-title{font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px}

/* Engine selector */
.studio-engines{display:flex;flex-direction:column;gap:4px}
.engine-btn{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--r1);border:1px solid var(--b1);background:transparent;cursor:pointer;transition:all .12s;width:100%;text-align:left;font-family:var(--fb)}
.engine-btn:hover{border-color:var(--b2);background:var(--s3)}
.engine-btn.on{border-color:rgba(0,212,176,.3);background:rgba(0,212,176,.06)}
.engine-icon{font-size:16px;width:24px;text-align:center;flex-shrink:0;line-height:1}
.engine-name{font-size:11px;font-weight:600;color:var(--t1)}
.engine-desc{font-size:9px;color:var(--t3);margin-top:1px}
.engine-type-bdg{margin-left:auto;flex-shrink:0}

/* Prompt */
.studio-prompt-wrap{position:relative}
.studio-textarea{background:var(--s3);border:1px solid var(--b1);border-radius:var(--r1);padding:9px 11px;font-size:12px;color:var(--t1);font-family:var(--fb);outline:none;width:100%;resize:vertical;min-height:80px;line-height:1.6;transition:border-color .12s}
.studio-textarea:focus{border-color:var(--teal)}
.studio-textarea::placeholder{color:var(--t3)}
.studio-enhance-btn{position:absolute;bottom:7px;right:7px;display:flex;align-items:center;gap:4px;padding:3px 8px;background:rgba(0,212,176,.1);border:1px solid rgba(0,212,176,.2);border-radius:4px;font-size:9px;font-weight:700;color:var(--teal);cursor:pointer;transition:all .12s;font-family:var(--fb)}
.studio-enhance-btn:hover{background:rgba(0,212,176,.18)}
.studio-hint{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--teal);background:rgba(0,212,176,.06);border:1px solid rgba(0,212,176,.15);border-radius:var(--r1);padding:6px 10px;margin-bottom:8px}

/* Aspect ratio */
.aspect-row{display:flex;gap:5px;flex-wrap:wrap}
.aspect-btn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 8px;border-radius:var(--r1);border:1px solid var(--b1);background:transparent;cursor:pointer;color:var(--t2);font-size:9px;font-weight:600;letter-spacing:.5px;transition:all .12s;font-family:var(--fb)}
.aspect-btn:hover{border-color:var(--b2);color:var(--t1)}
.aspect-btn.on{border-color:rgba(0,212,176,.4);color:var(--teal);background:rgba(0,212,176,.06)}

/* Style presets */
.style-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.style-btn{display:flex;flex-direction:column;align-items:center;gap:4px;border:1px solid var(--b1);border-radius:var(--r1);background:transparent;cursor:pointer;overflow:hidden;padding:0 0 5px;transition:all .12s;font-family:var(--fb)}
.style-btn:hover{border-color:var(--b2)}
.style-btn.on{border-color:rgba(0,212,176,.4)}
.style-thumb{width:100%;height:30px}
.style-btn span{font-size:8px;color:var(--t2);letter-spacing:.3px;font-weight:500}
.style-btn.on span{color:var(--teal)}

/* Generate button */
.studio-generate-area{margin-top:14px}
.studio-gen-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;background:var(--teal);color:#000;border:none;border-radius:var(--r2);font-size:13px;font-weight:700;cursor:pointer;font-family:var(--fh);letter-spacing:.8px;transition:background .12s}
.studio-gen-btn:hover{background:var(--teal2)}
.studio-gen-btn:disabled{opacity:.5;cursor:default}

/* Canvas / masonry */
.studio-canvas{min-height:400px}
.canvas-masonry{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.canvas-col{display:flex;flex-direction:column;gap:8px}
.asset-thumb-wrap{position:relative;border-radius:var(--r2);overflow:hidden;cursor:pointer;background:var(--s2);border:1px solid var(--b1);transition:all .15s}
.asset-thumb-wrap:hover{border-color:var(--b2);transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,0,0,.3)}

/* STRATA — Anthropic API key from localStorage */
(function() {
  var KEY_NAME = 'strata_anthropic_key';
  function getApiKey() { return localStorage.getItem(KEY_NAME) || ''; }

  /* Patch fetch to auto-inject headers for Anthropic API calls */
  var _fetch = window.fetch;
  window.fetch = function(url, opts) {
    if (typeof url === 'string' && url.includes('api.anthropic.com')) {
      var key = getApiKey();
      if (!key) {
        return Promise.reject(new Error('API Key não configurada. Acede ao hub principal e configura a tua Anthropic API Key.'));
      }
      opts = opts || {};
      opts.headers = Object.assign({}, opts.headers, {
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-calls': 'true'
      });
    }
    return _fetch.apply(window, [url, opts]);
  };

  /* Show key status badge */
  window.addEventListener('DOMContentLoaded', function() {
    var key = getApiKey();
    var badge = document.createElement('a');
    badge.href = '/';
    badge.title = key ? 'API Key configurada — clica para voltar ao hub' : 'API Key não configurada — clica para configurar';
    badge.style.cssText = 'position:fixed;bottom:16px;right:16px;z-index:9999;display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.5px;text-decoration:none;font-family:Barlow,sans-serif;transition:all .15s;border:1px solid;';
    if (key) {
      badge.style.background = 'rgba(40,200,122,.12)';
      badge.style.borderColor = 'rgba(40,200,122,.3)';
      badge.style.color = '#28C87A';

      badge.style.background = 'rgba(245,166,35,.1)';
      badge.style.borderColor = 'rgba(245,166,35,.3)';
      badge.style.color = '#F5A623';

    }
    document.body.appendChild(badge);
  });
})();

/* ═══════════════════════════════════════════════
   SVG CHART HELPERS
   ═══════════════════════════════════════════════ */
function svgLineChart(opts) {
  /* opts: { width, height, series:[{data,color,label,dashed}], labels, padL, padR, padT, padB, showArea, noGrid } */
  var W = opts.width || 480, H = opts.height || 160;
  var PL = opts.padL || 42, PR = opts.padR || 12, PT = opts.padT || 10, PB = opts.padB || 28;
  var cW = W - PL - PR, cH = H - PT - PB;
  var series = opts.series || [];
  var labels = opts.labels || [];
  var n = labels.length;
  var allVals = [];
  series.forEach(function(s){ s.data.forEach(function(v){ if (v !== null) allVals.push(v); }); });
  var maxV = Math.max.apply(null, allVals) * 1.12;
  var minV = opts.minZero ? 0 : (Math.min.apply(null, allVals) * 0.9);
  if (maxV === minV) maxV = minV + 1;
  var range = maxV - minV;
  var xStep = n > 1 ? cW / (n - 1) : cW;
  var yScale = function(v){ return PT + cH - ((v - minV) / range) * cH; };

  var html = '<svg viewBox="0 0 ' + W + ' ' + H + '" style="width:100%;height:auto;display:block;overflow:visible" xmlns="http://www.w3.org/2000/svg">';

  /* Grid */
  if (!opts.noGrid) {
    var ticks = 4;
    for (var i = 0; i <= ticks; i++) {
      var val = minV + range * (i / ticks);
      var y = yScale(val);
      html += '<line x1="' + PL + '" y1="' + y + '" x2="' + (W - PR) + '" y2="' + y + '" stroke="#22262C" stroke-width="1"/>';
      var lbl = val >= 1000 ? (val/1000).toFixed(0) + 'k' : val.toFixed(0);
      html += '<text x="' + (PL - 4) + '" y="' + (y + 3.5) + '" text-anchor="end" fill="#3E4652" font-size="9" font-family="Barlow,sans-serif">' + lbl + '</text>';
    }
  }

  /* X labels */
  var lStep = Math.max(1, Math.floor(n / 7));
  for (var j = 0; j < n; j += lStep) {
    var xPos = PL + j * xStep;
    html += '<text x="' + xPos + '" y="' + (H - PB + 14) + '" text-anchor="middle" fill="#3E4652" font-size="9" font-family="Barlow,sans-serif">' + (labels[j] || '') + '</text>';
  }

  /* Series */
  series.forEach(function(s) {
    if (!s.data || s.data.length === 0) return;
    var pts = s.data.map(function(v, i){ return [PL + i * xStep, yScale(v)]; });
    var col = s.color || '#00D4B0';
    var pathD = pts.map(function(p, i){ return (i === 0 ? 'M' : 'L') + p[0].toFixed(1) + ',' + p[1].toFixed(1); }).join(' ');

    if (opts.showArea && !s.dashed) {
      var areaD = pathD + ' L' + pts[pts.length-1][0].toFixed(1) + ',' + (PT + cH) + ' L' + pts[0][0].toFixed(1) + ',' + (PT + cH) + ' Z';
      html += '<path d="' + areaD + '" fill="' + col + '" opacity="0.07"/>';
    }
    html += '<path d="' + pathD + '" fill="none" stroke="' + col + '" stroke-width="' + (s.dashed ? 1.5 : 2) + '"' + (s.dashed ? ' stroke-dasharray="4,3"' : '') + '/>';

    if (!s.dashed) {
      pts.forEach(function(p, i) {
        html += '<circle cx="' + p[0].toFixed(1) + '" cy="' + p[1].toFixed(1) + '" r="3" fill="' + col + '" stroke="var(--s2)" stroke-width="1.5"><title>' + (labels[i] || '') + ': €' + (s.data[i] || 0).toLocaleString('pt-PT') + '</title></circle>';
      });
    }
  });

  /* Axes */
  html += '<line x1="' + PL + '" y1="' + PT + '" x2="' + PL + '" y2="' + (PT + cH) + '" stroke="#2E343C" stroke-width="1"/>';
  html += '<line x1="' + PL + '" y1="' + (PT + cH) + '" x2="' + (W - PR) + '" y2="' + (PT + cH) + '" stroke="#2E343C" stroke-width="1"/>';
  html += '</svg>';
  return html;
}

function svgBarChart(opts) {
  /* opts: { data:[{label,value,color}], width, height, horizontal } */
  var W = opts.width || 320, H = opts.height || 140;
  var PL = 42, PR = 12, PT = 10, PB = 26;
  var cW = W - PL - PR, cH = H - PT - PB;
  var data = opts.data || [];
  var n = data.length;
  var maxV = Math.max.apply(null, data.map(function(d){ return d.value; })) * 1.12;
  var barW = (cW / n) * 0.55;
  var gap  = cW / n;

  var html = '<svg viewBox="0 0 ' + W + ' ' + H + '" style="width:100%;height:auto;display:block" xmlns="http://www.w3.org/2000/svg">';

  /* Grid */
  for (var i = 0; i <= 3; i++) {
    var val = maxV * (i / 3);
    var y = PT + cH - (val / maxV) * cH;
    html += '<line x1="' + PL + '" y1="' + y + '" x2="' + (W - PR) + '" y2="' + y + '" stroke="#22262C" stroke-width="1"/>';
    html += '<text x="' + (PL - 4) + '" y="' + (y + 3.5) + '" text-anchor="end" fill="#3E4652" font-size="9" font-family="Barlow,sans-serif">' + (val >= 1000 ? (val/1000).toFixed(0)+'k' : val.toFixed(0)) + '</text>';
  }

  data.forEach(function(d, i) {
    var x = PL + i * gap + (gap - barW) / 2;
    var bH = (d.value / maxV) * cH;
    var y = PT + cH - bH;
    var col = d.color || '#00D4B0';
    html += '<rect x="' + x.toFixed(1) + '" y="' + y.toFixed(1) + '" width="' + barW.toFixed(1) + '" height="' + bH.toFixed(1) + '" fill="' + col + '" opacity="' + (d.active ? 1 : 0.45) + '" rx="2"><title>' + d.label + ': €' + d.value.toLocaleString('pt-PT') + '</title></rect>';
    html += '<text x="' + (x + barW/2).toFixed(1) + '" y="' + (H - PB + 13) + '" text-anchor="middle" fill="' + (d.active ? col : '#3E4652') + '" font-size="9" font-family="Barlow,sans-serif" font-weight="' + (d.active ? '600' : '400') + '">' + d.label + '</text>';
  });

  html += '<line x1="' + PL + '" y1="' + PT + '" x2="' + PL + '" y2="' + (PT + cH) + '" stroke="#2E343C" stroke-width="1"/>';
  html += '<line x1="' + PL + '" y1="' + (PT + cH) + '" x2="' + (W - PR) + '" y2="' + (PT + cH) + '" stroke="#2E343C" stroke-width="1"/>';
  html += '</svg>';
  return html;
}

  var m = { draft:'bdg-gr', in_review:'bdg-a', approved:'bdg-g', published:'bdg-t', rejected:'bdg-r' };
  return '<span class="bdg ' + (m[s]||'bdg-gr') + '">' + statusLabel(s) + '</span>';
}

function renderMktCriar(el) {
  var tabHtml = '<div class="studio-tabs">'
    + studioTabBtn('generate', 'Geração')
    + studioTabBtn('review',   'Revisão & Aprovação <span class="studio-tab-cnt">' + STUDIO_ASSETS.filter(function(a){return a.status==='in_review';}).length + '</span>')
    + studioTabBtn('library',  'Biblioteca <span class="studio-tab-cnt">' + STUDIO_ASSETS.length + '</span>')
    + '</div>';

  var bodyHtml;
  if (studioTab === 'generate') {
    bodyHtml = renderStudioGenerate();
  } else if (studioTab === 'review') {
    bodyHtml = renderStudioReview();
  } else {
    bodyHtml = renderStudioLibrary();
  }

  el.innerHTML = '<div class="sec-hd"><div><div class="sec-title">Creative Studio</div>'
    + '<div class="sec-sub">Geração de imagem e vídeo com IA · Revisão · Aprovação</div></div>'
    + '<div style="display:flex;gap:7px" id="studio-hd-actions"></div></div>'
    + tabHtml
    + bodyHtml;

  updateStudioHeader();
}

function studioTabBtn(id, lbl) {
  var on = studioTab === id;
  return '<button class="studio-tab-btn' + (on ? ' on' : '') + '" onclick="studioTab=\'' + id + '\';renderMktCriar($(\'content\'))">' + lbl + '</button>';
}

function updateStudioHeader() {
  var el = document.getElementById('studio-hd-actions');
  if (!el) return;
  if (studioTab === 'generate') {
    el.innerHTML = '<button class="btn btn-ghost btn-sm" onclick="studioTab=\'library\';renderMktCriar($(\'content\'))">Ver biblioteca</button>'
      + '<button class="btn btn-teal btn-sm" id="gen-btn" onclick="generateCopy()">Gerar com Claude</button>';
  } else if (studioTab === 'review') {
    el.innerHTML = '<button class="btn btn-ok btn-sm" onclick="approveAll()">Aprovar seleccionados</button>';
  } else {
    el.innerHTML = '<button class="btn btn-ghost btn-sm" onclick="studioViewMode=studioViewMode===\'grid\'?\'list\':\'grid\';renderMktCriar($(\'content\'))">Toggle view</button>'
      + '<button class="btn btn-teal btn-sm" onclick="studioTab=\'generate\';renderMktCriar($(\'content\'))">+ Gerar assets</button>';
  }
}

/* ─── GENERATE TAB ─── */
function renderStudioGenerate() {
  /* engine selector */
  var enginesHtml = '<div class="studio-engines">';
  Object.keys(ENGINE_META).forEach(function(k) {
    var e = ENGINE_META[k];
    var on = studioEngine === k;
    enginesHtml += '<button class="engine-btn' + (on ? ' on' : '') + '" onclick="studioEngine=\'' + k + '\';renderMktCriar($(\'content\'))">'
      + '<span class="engine-icon">' + e.icon + '</span>'
      + '<div><div class="engine-name">' + e.label + '</div>'
      + '<div class="engine-desc">' + e.desc + '</div></div>'
      + '<span class="bdg ' + e.tag + ' engine-type-bdg">' + e.type + '</span>'
      + '</button>';
  });
  enginesHtml += '</div>';

  /* aspect ratios */
  var aspectHtml = '<div class="aspect-row">';
  ASPECT_PRESETS.forEach(function(a) {
    var on = studioAspect === a.id;
    var boxW = Math.round(26 * a.w / Math.max(a.w, a.h));
    var boxH = Math.round(26 * a.h / Math.max(a.w, a.h));
    aspectHtml += '<button class="aspect-btn' + (on ? ' on' : '') + '" onclick="studioAspect=\'' + a.id + '\';renderMktCriar($(\'content\'))" title="' + a.use + '">'
      + '<div style="width:' + boxW + 'px;height:' + boxH + 'px;border:1.5px solid currentColor;border-radius:2px"></div>'
      + '<span>' + a.label + '</span>'
      + '</button>';
  });
  aspectHtml += '</div>';

  /* style presets */
  var styleHtml = '<div class="style-grid">';
  STYLE_PRESETS.forEach(function(s) {
    var on = studioStyle === s.id;
    var cols = s.cols.split(',');
    styleHtml += '<button class="style-btn' + (on ? ' on' : '') + '" onclick="studioStyle=\'' + s.id + '\';renderMktCriar($(\'content\'))">'
      + '<div class="style-thumb" style="background:linear-gradient(135deg,' + cols[0] + ',' + cols[1] + ')"></div>'
      + '<span>' + s.label + '</span></button>';
  });
  styleHtml += '</div>';

  /* ai copy suggestion */
  var copyHint = mktCreateData.generated
    ? '<div class="studio-hint"><svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="5.5,1 10,4 10,8 5.5,10.5 1,8 1,4"/><circle cx="5.5" cy="5.5" r="1.5"/></svg>Sugestão de prompt da IA activa — <button onclick="applyAiPrompt()" style="background:none;border:none;color:var(--teal);cursor:pointer;font-size:10px;font-weight:600;padding:0">Aplicar ao gerador →</button></div>'
    : '';

  /* main layout */
  return '<div class="studio-layout">'
    /* ── LEFT PANEL ── */
    + '<div class="studio-left">'
    + '<div class="studio-section-title">Motor de Geração</div>'
    + enginesHtml
    + '<div class="studio-section-title" style="margin-top:16px">Prompt</div>'
    + copyHint
    + '<div class="studio-prompt-wrap">'
    + '<textarea id="studio-prompt" class="studio-textarea" placeholder="Descreve a imagem que queres gerar… quanto mais detalhe, melhor o resultado." oninput="studioPrompt=this.value">' + studioPrompt + '</textarea>'
    + '<button class="studio-enhance-btn" onclick="enhancePrompt()" title="Melhorar prompt com Claude">'
    + '<svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="5.5,1 10,4 10,8 5.5,10.5 1,4"/><circle cx="5.5" cy="5.5" r="1.5"/></svg> Melhorar com IA</button>'
    + '</div>'
    + '<div class="studio-section-title" style="margin-top:14px">Prompt negativo</div>'
    + '<textarea id="studio-neg-prompt" class="studio-textarea" style="min-height:52px" placeholder="O que não queres na imagem… (ex: texto, blur, distorção)" oninput="studioNegPrompt=this.value">' + studioNegPrompt + '</textarea>'
    + '<div class="studio-section-title" style="margin-top:14px">Aspect Ratio</div>'
    + aspectHtml
    + '<div class="studio-section-title" style="margin-top:14px">Estilo</div>'
    + styleHtml
    + '<div class="studio-section-title" style="margin-top:14px">Qualidade & Quantidade</div>'
    + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">'
    + '<div class="fld"><label>Qualidade</label>'
    + '<select class="inp" style="font-size:11px" onchange="studioQuality=this.value">'
    + ['draft','standard','high','ultra'].map(function(q){ return '<option value="' + q + '"' + (studioQuality===q?' selected':'') + '>' + {draft:'Draft (rápido)',standard:'Standard',high:'High Quality',ultra:'Ultra HD'}[q] + '</option>'; }).join('')
    + '</select></div>'
    + '<div class="fld"><label>Quantidade</label>'
    + '<select class="inp" style="font-size:11px"><option>1 imagem</option><option>2 imagens</option><option selected>4 imagens</option></select></div>'
    + '</div>'
    + '<div class="studio-generate-area">'
    + '<button class="studio-gen-btn" id="studio-gen-btn" onclick="simulateGenerate()">'
    + '<svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2"><polygon points="7,1 13,4.5 13,9.5 7,13 1,9.5 1,4.5"/><circle cx="7" cy="7" r="2.5"/></svg>'
    + ' Gerar com ' + ENGINE_META[studioEngine].label
    + '</button>'
    + '<div style="font-size:9px;color:var(--t3);text-align:center;margin-top:6px">~' + {flux:'8s',dalle3:'12s',midj:'25s',sdxl:'6s',ideogram:'10s',runway:'45s',sora:'90s'}[studioEngine] + ' por geração</div>'
    + '</div>'
    + '</div>'
    /* ── RIGHT PANEL ── */
    + '<div class="studio-right">'
    + renderStudioCanvas()
    + '</div>'
    + '</div>';
}

function renderStudioCanvas() {
  var recent = STUDIO_ASSETS.slice().reverse().slice(0, 8);

  var html = '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">'
    + '<div style="font-size:11px;font-weight:600;color:var(--t1)">Resultados recentes</div>'
    + '<div style="display:flex;gap:5px">'
    + '<button class="btn btn-ghost btn-xs" onclick="studioTab=\'library\';renderMktCriar($(\'content\'))">Ver tudo (' + STUDIO_ASSETS.length + ')</button>'
    + '</div></div>'
    + '<div class="studio-canvas" id="studio-canvas">';

  if (studioGenerating) {
    html += renderGeneratingPlaceholders();
  } else {
    var cols = [[], [], []];
    recent.forEach(function(a, i) { cols[i % 3].push(a); });
    html += '<div class="canvas-masonry">';
    cols.forEach(function(col) {
      html += '<div class="canvas-col">';
      col.forEach(function(a) { html += renderAssetThumb(a, true); });
      html += '</div>';
    });
    html += '</div>';
  }
  html += '</div>';
  return html;
}

function renderAssetThumb(a, inCanvas) {
  var aspect = a.aspect || '1:1';
  var parts = aspect.split(':');
  var ratio = (parseInt(parts[1]) / parseInt(parts[0]) * 100).toFixed(1);
  var bg = ASSET_GRADIENTS[a.idx % ASSET_GRADIENTS.length];
  var eng = ENGINE_META[a.engine] || {};

  return '<div class="asset-thumb-wrap ' + (a.isVideo ? 'is-video' : '') + '" onclick="openAssetReview(' + a.id + ')">'
    + '<div class="asset-thumb-img" style="padding-bottom:' + ratio + '%;background:' + bg + '">'
    + '<div class="asset-thumb-inner">'
    + (a.isVideo
        ? '<div class="asset-video-icon"><svg width="20" height="20" viewBox="0 0 20 20" fill="none"><polygon points="8,6 16,10 8,14" fill="currentColor"/><circle cx="10" cy="10" r="9" stroke="currentColor" stroke-width="1.5" fill="none"/></svg></div>'
        : '<div class="asset-thumb-placeholder"><svg width="28" height="28" viewBox="0 0 26 22" fill="none" opacity=".3"><path d="M2 16L13 11L24 16" stroke="#00D4B0" stroke-width="2.5" stroke-linecap="round"/><path d="M2 11L13 6L24 11" stroke="#C0C8D4" stroke-width="2" stroke-linecap="round"/><path d="M2 6L13 1L24 6" stroke="#EEF0F4" stroke-width="1.5" stroke-linecap="round"/></svg></div>')
    + '</div>'
    + '<div class="asset-thumb-overlay">'
    + '<div style="display:flex;gap:5px;flex-wrap:wrap">'
    + statusBdg(a.status)
    + '<span class="bdg ' + (eng.tag||'bdg-gr') + '" style="font-size:8px">' + (eng.label||a.engine) + '</span>'
    + '</div>'
    + '<div style="display:flex;gap:4px;margin-top:6px">'
    + '<button class="asset-action-btn" onclick="event.stopPropagation();toggleLike(' + a.id + ')" title="Like">'
    + (a.liked ? '<svg width="11" height="11" viewBox="0 0 11 11" fill="#F04F5A" stroke="#F04F5A" stroke-width="1"><path d="M5.5 9.5S1 6.5 1 3.5C1 2.1 2.1 1 3.5 1c.8 0 1.5.4 2 1 .5-.6 1.2-1 2-1C8.9 1 10 2.1 10 3.5c0 3-4.5 6-4.5 6z"/></svg>'
    : '<svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5.5 9.5S1 6.5 1 3.5C1 2.1 2.1 1 3.5 1c.8 0 1.5.4 2 1 .5-.6 1.2-1 2-1C8.9 1 10 2.1 10 3.5c0 3-4.5 6-4.5 6z"/></svg>')
    + '</button>'
    + '<button class="asset-action-btn" onclick="event.stopPropagation();openAssetReview(' + a.id + ')" title="Rever">'
    + '<svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="5.5" cy="5.5" r="4.5"/><path d="M5.5 3.5v2.5l2 1"/></svg>'
    + '</button>'
    + '<button class="asset-action-btn" onclick="event.stopPropagation();changeAssetStatus(' + a.id + ',\'approved\')" title="Aprovar">'
    + '<svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1.5 5.5l3 3 5-5"/></svg>'
    + '</button>'
    + '</div></div>'
    + '</div>'
    + (a.comments && a.comments.length ? '<div class="asset-comment-count"><svg width="9" height="9" viewBox="0 0 9 9" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 1h7v5H3.5L1 7.5V6H1V1z"/></svg>' + a.comments.length + '</div>' : '')
    + '</div>';
}

function renderGeneratingPlaceholders() {
  var html = '<div class="canvas-masonry"><div class="canvas-col">';
  for (var i = 0; i < 4; i++) {
    html += '<div class="asset-thumb-wrap">'
      + '<div class="asset-thumb-img generating-pulse" style="padding-bottom:' + [100,133,75,100][i] + '%">'
      + '<div class="asset-thumb-inner"><div class="generating-text">Gerando com ' + ENGINE_META[studioEngine].label + '…</div></div></div></div>';
    if (i === 1) html += '</div><div class="canvas-col">';
    if (i === 2) html += '</div><div class="canvas-col">';
  }
  return html + '</div></div>';
}

/* ─── REVIEW TAB ─── */
function renderStudioReview() {
  var inReview   = STUDIO_ASSETS.filter(function(a){ return a.status === 'in_review'; });
  var drafts     = STUDIO_ASSETS.filter(function(a){ return a.status === 'draft'; });
  var approved   = STUDIO_ASSETS.filter(function(a){ return a.status === 'approved'; });
  var published  = STUDIO_ASSETS.filter(function(a){ return a.status === 'published'; });

  /* if reviewing a single asset */
  if (studioReviewAsset !== null) {
    var a = STUDIO_ASSETS.filter(function(x){ return x.id === studioReviewAsset; })[0];
    if (a) return renderAssetDetailReview(a);
  }

  var html = '<div class="review-board">';

  var columns = [
    { id:'draft',     label:'Rascunho',   color:'var(--t3)', assets: drafts },
    { id:'in_review', label:'Em Revisão', color:'var(--amber)', assets: inReview },
    { id:'approved',  label:'Aprovado',   color:'var(--green)', assets: approved },
    { id:'published', label:'Publicado',  color:'var(--teal)',  assets: published },
  ];

  columns.forEach(function(col) {
    html += '<div class="review-col">'
      + '<div class="review-col-head" style="border-top-color:' + col.color + '">'
      + '<span class="review-col-title" style="color:' + col.color + '">' + col.label + '</span>'
      + '<span class="review-col-count">' + col.assets.length + '</span>'
      + '</div>'
      + '<div class="review-col-body">';

    if (col.assets.length === 0) {
      html += '<div style="padding:20px 12px;text-align:center;color:var(--t3);font-size:11px">Sem assets</div>';
    }

    col.assets.forEach(function(a) {
      var bg = ASSET_GRADIENTS[a.idx % ASSET_GRADIENTS.length];
      var eng = ENGINE_META[a.engine] || {};
      html += '<div class="review-card" onclick="studioReviewAsset=' + a.id + ';renderMktCriar($(\'content\'))">'
        + '<div style="height:90px;background:' + bg + ';border-radius:var(--r1);margin-bottom:8px;position:relative;display:flex;align-items:center;justify-content:center">'
        + (a.isVideo ? '<svg width="24" height="24" viewBox="0 0 24 24" fill="none"><polygon points="10,8 18,12 10,16" fill="var(--pink)"/><circle cx="12" cy="12" r="11" stroke="var(--pink)" stroke-width="1.5" fill="none"/></svg>'
                     : '<svg width="24" height="24" viewBox="0 0 26 22" fill="none" opacity=".4"><path d="M2 16L13 11L24 16" stroke="#00D4B0" stroke-width="2.5" stroke-linecap="round"/><path d="M2 11L13 6L24 11" stroke="#C0C8D4" stroke-width="2" stroke-linecap="round"/></svg>')
        + (a.liked ? '<div style="position:absolute;top:5px;right:5px;color:var(--red);font-size:10px">♥</div>' : '')
        + '</div>'
        + '<div style="font-size:10px;color:var(--t2);line-height:1.4;margin-bottom:6px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical">' + a.prompt + '</div>'
        + '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">'
        + '<span class="bdg ' + (eng.tag||'bdg-gr') + '" style="font-size:8px">' + (eng.label||a.engine) + '</span>'
        + '<span style="font-size:9px;color:var(--t3)">' + a.aspect + '</span>'
        + '</div>'
        + (a.comments.length > 0 ? '<div style="display:flex;align-items:center;gap:4px;font-size:10px;color:var(--t2);padding:5px 0;border-top:1px solid var(--b1)"><svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 1h8v6H3.5L1 9V7H1V1z"/></svg>' + a.comments.length + ' comentário(s)</div>' : '')
        + '<div style="display:flex;gap:4px;margin-top:6px">'
        + (col.id === 'in_review' ? '<button class="btn btn-ok btn-xs" style="flex:1;justify-content:center" onclick="event.stopPropagation();changeAssetStatus(' + a.id + ',\'approved\')">Aprovar</button><button class="btn btn-danger btn-xs" onclick="event.stopPropagation();changeAssetStatus(' + a.id + ',\'draft\')">Rejeitar</button>' : '')
        + (col.id === 'draft' ? '<button class="btn btn-warn btn-xs" style="flex:1;justify-content:center" onclick="event.stopPropagation();changeAssetStatus(' + a.id + ',\'in_review\')">Enviar para revisão</button>' : '')
        + (col.id === 'approved' ? '<button class="btn btn-teal btn-xs" style="flex:1;justify-content:center" onclick="event.stopPropagation();changeAssetStatus(' + a.id + ',\'published\')">Publicar</button>' : '')
        + '</div></div>';
    });

    html += '</div></div>';
  });

  html += '</div>';
  return html;
}

function renderAssetDetailReview(a) {
  var bg  = ASSET_GRADIENTS[a.idx % ASSET_GRADIENTS.length];
  var eng = ENGINE_META[a.engine] || {};
  var aspect = a.aspect || '1:1';
  var parts = aspect.split(':');
  var ratio = (parseInt(parts[1]) / parseInt(parts[0]) * 100).toFixed(1);

  return '<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">'
    + '<button class="btn btn-ghost btn-xs" onclick="studioReviewAsset=null;renderMktCriar($(\'content\'))">← Revisão</button>'
    + '<div style="font-family:var(--fh);font-size:16px;font-weight:700;letter-spacing:.5px">Revisão de Asset</div>'
    + '<div style="margin-left:auto;display:flex;gap:6px">'
    + '<button class="btn btn-danger btn-sm" onclick="changeAssetStatus(' + a.id + ',\'draft\');studioReviewAsset=null;renderMktCriar($(\'content\'))">Rejeitar</button>'
    + '<button class="btn btn-warn btn-sm" onclick="changeAssetStatus(' + a.id + ',\'in_review\');studioReviewAsset=null;renderMktCriar($(\'content\'))">Em revisão</button>'
    + '<button class="btn btn-ok btn-sm" onclick="changeAssetStatus(' + a.id + ',\'approved\');studioReviewAsset=null;renderMktCriar($(\'content\'))">Aprovar</button>'
    + '<button class="btn btn-teal btn-sm" onclick="changeAssetStatus(' + a.id + ',\'published\');studioReviewAsset=null;renderMktCriar($(\'content\'))">Publicar</button>'
    + '</div></div>'
    + '<div class="g2" style="align-items:start">'
    /* Asset preview */
    + '<div>'
    + '<div style="background:' + bg + ';border-radius:var(--r3);overflow:hidden;position:relative;padding-bottom:' + ratio + '%">'
    + '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center">'
    + (a.isVideo
      ? '<div style="text-align:center"><svg width="48" height="48" viewBox="0 0 48 48" fill="none"><polygon points="19,15 35,24 19,33" fill="var(--pink)"/><circle cx="24" cy="24" r="22" stroke="var(--pink)" stroke-width="2" fill="none"/></svg><div style="font-size:11px;color:var(--pink);margin-top:8px">Video Preview</div></div>'
      : '<svg width="48" height="48" viewBox="0 0 26 22" fill="none" opacity=".25"><path d="M2 16L13 11L24 16" stroke="#00D4B0" stroke-width="2.5" stroke-linecap="round"/><path d="M2 11L13 6L24 11" stroke="#C0C8D4" stroke-width="2" stroke-linecap="round"/><path d="M2 6L13 1L24 6" stroke="#EEF0F4" stroke-width="1.5" stroke-linecap="round"/></svg>')
    + '</div></div>'
    + '<div class="card" style="margin-top:12px">'
    + '<div class="card-title">Metadata</div>'
    + '<div class="srow"><span style="font-size:11px;color:var(--t2)">Motor</span><span class="bdg ' + eng.tag + '">' + eng.label + '</span></div>'
    + '<div class="srow"><span style="font-size:11px;color:var(--t2)">Tipo</span><span style="font-size:11px;color:var(--t1)">' + (a.isVideo ? 'Vídeo' : 'Imagem') + '</span></div>'
    + '<div class="srow"><span style="font-size:11px;color:var(--t2)">Aspect Ratio</span><span style="font-size:11px;color:var(--t1)">' + a.aspect + '</span></div>'
    + '<div class="srow"><span style="font-size:11px;color:var(--t2)">Estilo</span><span style="font-size:11px;color:var(--t1)">' + (STYLE_PRESETS.filter(function(s){return s.id===a.style;})[0]||{label:a.style}).label + '</span></div>'
    + '<div class="srow"><span style="font-size:11px;color:var(--t2)">Estado</span>' + statusBdg(a.status) + '</div>'
    + '<div class="srow"><span style="font-size:11px;color:var(--t2)">Criado</span><span style="font-size:11px;color:var(--t1)">' + a.created + '</span></div>'
    + '<div style="padding:8px 0"><span style="font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:1px">Prompt</span>'
    + '<div style="font-size:11px;color:var(--t2);line-height:1.6;margin-top:4px">' + a.prompt + '</div></div>'
    + '<div style="display:flex;gap:6px;margin-top:10px">'
    + '<button class="btn btn-ghost btn-sm" style="flex:1;justify-content:center">Descarregar</button>'
    + '<button class="btn btn-ghost btn-sm" style="flex:1;justify-content:center">Usar em campanha</button>'
    + '</div></div></div>'
    /* Comments panel */
    + '<div>'
    + '<div class="card">'
    + '<div class="card-title">Comentários &amp; Feedback (' + a.comments.length + ')</div>'
    + (a.comments.length === 0
      ? '<div style="padding:16px 0;text-align:center;color:var(--t3);font-size:12px">Sem comentários ainda</div>'
      : a.comments.map(function(cm) {
          var initials = cm.user.split(' ').map(function(w){return w[0];}).join('').slice(0,2).toUpperCase();
          return '<div class="comment-item">'

function simulateGenerate() {
  var btn = document.getElementById('studio-gen-btn');
  if (!btn || studioGenerating) return;
  studioGenerating = true;
  var canvas = document.getElementById('studio-canvas');
  if (canvas) canvas.innerHTML = renderGeneratingPlaceholders();
  btn.disabled = true;
  btn.innerHTML = '<span class="pulsing">Gerando com ' + ENGINE_META[studioEngine].label + '…</span>';

  var duration = { flux:2000, dalle3:2500, midj:3000, sdxl:1800, ideogram:2200, runway:4000, sora:5000 }[studioEngine] || 2500;

  setTimeout(function() {
    var newIds = [STUDIO_ASSETS.length+1, STUDIO_ASSETS.length+2, STUDIO_ASSETS.length+3, STUDIO_ASSETS.length+4];
    var stylePreset = STYLE_PRESETS.filter(function(s){return s.id===studioStyle;})[0] || STYLE_PRESETS[0];
    var prompt = studioPrompt || ('STRATA Revenue OS — ' + stylePreset.label + ' · Professional B2B');
    newIds.slice(0, studioEngine === 'runway' || studioEngine === 'sora' ? 1 : 4).forEach(function(newId, i) {
      STUDIO_ASSETS.push({
        id:newId, engine:studioEngine, prompt:prompt, aspect:studioAspect, style:studioStyle,
        status:'draft', comments:[], created:today, liked:false, idx:newId, isVideo:studioEngine==='runway'||studioEngine==='sora'
      });
    });
    studioGenerating = false;
    studioTab = 'review';
    renderMktCriar(document.getElementById('content'));
  }, duration);
}

async function enhancePrompt() {
  var inp = document.getElementById('studio-prompt');
  if (!inp || !inp.value.trim()) return;
  var btn = document.querySelector('.studio-enhance-btn');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="pulsing">Melhorando…</span>'; }

  try {
    var res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6', max_tokens:300,
        messages:[{ role:'user', content:'You are an expert AI image prompt engineer. Improve this prompt for ' + ENGINE_META[studioEngine].label + '. Make it more detailed, vivid, and optimized for the ' + studioStyle + ' style. Return ONLY the improved prompt, nothing else.\n\nOriginal: ' + inp.value }]
      })
    });
    var data = await res.json();
    var improved = ((data.content||[])[0]||{}).text || '';
    if (improved) { inp.value = improved; studioPrompt = improved; }
  } catch(e) {
    console.error('Enhance prompt error:', e);
  }

  if (btn) { btn.disabled = false; btn.innerHTML = '<svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="5.5,1 10,4 10,8 5.5,10.5 1,4"/><circle cx="5.5" cy="5.5" r="1.5"/></svg> Melhorar com IA'; }
}

      + kpi('CPL Médio 2026', '€' + cpl26avg.toFixed(1), '−' + fmtPct(cplImprove) + ' vs 2025', 'up', '#28C87A')
      + kpi('Investimento 2026', fmtK(spend26sum), fmtK(spend26sum - spend25sum) + ' vs 2025', spend26sum > spend25sum ? 'down' : 'up')
      + '</div>';

    /* Leads YoY chart */
    html += '<div class="g2 mb16">';
    html += '<div class="card">'
      + '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">'
      + '<div class="card-title" style="margin-bottom:0">Leads Mensais — 2025 vs 2026</div>'
      + '<div style="display:flex;gap:12px">'
      + '<div style="display:flex;align-items:center;gap:5px;font-size:10px;color:var(--t2)"><div style="width:12px;height:2px;background:#00D4B0;border-radius:1px"></div>2026</div>'
      + '<div style="display:flex;align-items:center;gap:5px;font-size:10px;color:var(--t2)"><div style="width:12px;height:2px;background:#00D4B0;opacity:.4;border-radius:1px;border:1px dashed #00D4B0"></div>2025</div>'
      + '</div></div>'
      + svgLineChart({ labels:MESES, height:160, showArea:true, minZero:true, series:[
          { data:yoyData.leads26, color:'#00D4B0', label:'Leads 2026' },
          { data:yoyData.leads25, color:'#00D4B0', label:'Leads 2025', dashed:true },
        ]})
      + '<div style="display:flex;gap:16px;margin-top:10px;padding-top:10px;border-top:1px solid var(--b1)">'
      + '<div><div style="font-size:9px;color:var(--t3)">Total 2026 YTD</div><div style="font-family:var(--fh);font-size:16px;font-weight:700;color:var(--teal)">' + leads26sum + '</div></div>'
      + '<div><div style="font-size:9px;color:var(--t3)">Total 2025 YTD</div><div style="font-family:var(--fh);font-size:16px;font-weight:700;color:var(--t2)">' + leads25sum + '</div></div>'
      + '<div><div style="font-size:9px;color:var(--t3)">Crescimento YoY</div><div style="font-family:var(--fh);font-size:16px;font-weight:700;color:var(--green)">+' + fmtPct(leadsGrowth) + '</div></div>'
      + '</div></div>';

    /* CPL YoY chart */
    html += '<div class="card">'
      + '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">'
      + '<div class="card-title" style="margin-bottom:0">CPL Médio — 2025 vs 2026 (€)</div>'
      + '<div style="display:flex;gap:12px">'
      + '<div style="display:flex;align-items:center;gap:5px;font-size:10px;color:var(--t2)"><div style="width:12px;height:2px;background:#28C87A;border-radius:1px"></div>2026</div>'
      + '<div style="display:flex;align-items:center;gap:5px;font-size:10px;color:var(--t2)"><div style="width:12px;height:2px;background:#F5A623;opacity:.6;border-radius:1px;border:1px dashed #F5A623"></div>2025</div>'
      + '</div></div>'
      + svgLineChart({ labels:MESES, height:160, showArea:false, minZero:true, series:[
          { data:yoyData.cpl26, color:'#28C87A', label:'CPL 2026' },
          { data:yoyData.cpl25, color:'#F5A623', label:'CPL 2025', dashed:true },
        ]})
      + '<div style="display:flex;gap:16px;margin-top:10px;padding-top:10px;border-top:1px solid var(--b1)">'
      + '<div><div style="font-size:9px;color:var(--t3)">CPL médio 2026</div><div style="font-family:var(--fh);font-size:16px;font-weight:700;color:var(--green)">€' + cpl26avg.toFixed(1) + '</div></div>'
      + '<div><div style="font-size:9px;color:var(--t3)">CPL médio 2025</div><div style="font-family:var(--fh);font-size:16px;font-weight:700;color:var(--amber)">€' + cpl25avg.toFixed(1) + '</div></div>'
      + '<div><div style="font-size:9px;color:var(--t3)">Melhoria</div><div style="font-family:var(--fh);font-size:16px;font-weight:700;color:var(--green)">−' + fmtPct(cplImprove) + '</div></div>'
      + '</div></div>';

    html += '</div>'; /* g2 */

    /* Month-by-month YoY table */
    html += '<div class="card"><div class="card-title">Comparação Mês a Mês — 2025 vs 2026</div>'
      + '<div class="tbl-wrap"><table>'
      + '<thead><tr><th>Mês</th><th>Leads 2026</th><th>Leads 2025</th><th>Δ Leads</th><th>CPL 2026</th><th>CPL 2025</th><th>Δ CPL</th><th>Invest. 2026</th><th>Invest. 2025</th></tr></thead>'
      + '<tbody>';

    MESES.forEach(function(mes, i) {
      var l26 = yoyData.leads26[i], l25 = yoyData.leads25[i];
      var c26 = yoyData.cpl26[i],   c25 = yoyData.cpl25[i];
      var s26 = yoyData.spend26[i], s25 = yoyData.spend25[i];
      var dL = l25 > 0 ? ((l26 - l25) / l25 * 100).toFixed(0) : '—';
      var dC = c25 > 0 ? ((c26 - c25) / c25 * 100).toFixed(0) : '—';
      var isCur = i === 3; /* Abril */
      html += '<tr' + (isCur ? ' style="background:var(--s3)"' : '') + '>'
        + '<td class="hi">' + mes + (isCur ? ' <span class="bdg bdg-t" style="margin-left:4px">Actual</span>' : '') + '</td>'
        + '<td style="color:var(--teal);font-weight:600">' + l26 + '</td>'
        + '<td style="color:var(--t2)">' + l25 + '</td>'
        + '<td style="color:' + (Number(dL) >= 0 ? 'var(--green)' : 'var(--red)') + ';font-weight:600">' + (Number(dL) >= 0 ? '+' : '') + dL + '%</td>'
        + '<td style="color:var(--green);font-weight:600">€' + c26 + '</td>'
        + '<td style="color:var(--t2)">€' + c25 + '</td>'
        + '<td style="color:' + (Number(dC) <= 0 ? 'var(--green)' : 'var(--red)') + ';font-weight:600">' + (Number(dC) <= 0 ? '' : '+') + dC + '%</td>'
        + '<td style="font-size:11px">' + fmtK(s26) + '</td>'
        + '<td style="font-size:11px;color:var(--t2)">' + fmtK(s25) + '</td>'
        + '</tr>';
    });

    html += '</tbody></table></div></div>';
  }

  el.innerHTML = html;
}


/* ═══════════════════════════════════════════════
   CRM — PIPELINE
   ═══════════════════════════════════════════════ */
function renderCrmPipeline(el) {
  var stages = [
    { id:'lead',       label:'Lead',        cor:'#7A8494', contacts: CONTACTS.filter(function(x){return x.stage==='lead';}) },
    { id:'qualificado',label:'Qualificado', cor:'#4E9CF5', contacts: CONTACTS.filter(function(x){return x.stage==='qualificado';}) },
    { id:'proposta',   label:'Proposta',    cor:'#9B6BF2', contacts: CONTACTS.filter(function(x){return x.stage==='proposta';}) },
    { id:'negociacao', label:'Negociação',  cor:'#F5A623', contacts: CONTACTS.filter(function(x){return x.stage==='negociacao';}) },
    { id:'ganho',      label:'Ganho',       cor:'#28C87A', contacts: CONTACTS.filter(function(x){return x.stage==='ganho';}) },
  ];

  var totalPipeline = CONTACTS.filter(function(x){return x.stage !== 'ganho' && x.stage !== 'perdido';}).reduce(function(s,x){return s+x.valor;},0);

  var html = '<div class="sec-hd"><div><div class="sec-title">Pipeline de Vendas</div><div class="sec-sub">€' + fmtN(totalPipeline) + ' em pipeline · 8 deals activos</div></div>'
    + '<div style="display:flex;gap:7px">'
    + '<button class="btn btn-ghost btn-sm" onclick="goto(\'crm-contactos\')">Ver contactos</button>'
    + '<button class="btn btn-blue btn-sm" onclick="goto(\'crm-propostas\')">Propostas</button>'
    + '<button class="btn btn-teal btn-sm">+ Novo Deal</button>'
    + '</div></div>'
    + '<div class="pipeline">';

  stages.forEach(function(s) {
    var stageVal = s.contacts.reduce(function(sum,x){return sum+x.valor;},0);
    html += '<div class="pipe-col">'
      + '<div class="pipe-head" style="border-top:2px solid ' + s.cor + '">'
      + '<div><div class="pipe-name" style="color:' + s.cor + '">' + s.label + '</div>'
      + '<div style="font-size:10px;color:var(--t3);margin-top:1px">' + (stageVal > 0 ? fmtK(stageVal) : '') + '</div></div>'
      + '<span class="pipe-count">' + s.contacts.length + '</span>'
      + '</div>'
      + '<div class="pipe-body">';

    if (s.contacts.length === 0) {
      html += '<div style="padding:20px;text-align:center;color:var(--t3);font-size:11px">Sem deals nesta fase</div>';
    }
    s.contacts.forEach(function(contact) {
      var daysAgo = Math.floor(Math.random() * 14) + 1;
      html += '<div class="deal-card ' + (contact.score >= 85 ? 'hot' : '') + '" onclick="selectedContactId=' + contact.id + ';goto(\'crm-ficha\')">'
        + '<div class="deal-age">' + daysAgo + 'd</div>'
        + '<div class="deal-co">' + contact.empresa + '</div>'
        + '<div class="deal-val" style="color:' + s.cor + '">' + fmtK(contact.valor) + '</div>'
        + '<div class="deal-meta">' + contact.nome + ' ' + contact.apelido + ' · ' + contact.cargo + '</div>'
        + '<div style="display:flex;align-items:center;justify-content:space-between;margin-top:7px">'
        + '<div style="font-size:9px;color:var(--t3)">' + contact.origem + '</div>'
        + '<div style="display:flex;align-items:center;gap:4px">'
        + '<div style="width:' + (contact.score > 70 ? 22 : 16) + 'px;height:4px;border-radius:2px;background:' + (contact.score >= 85 ? 'var(--teal)' : contact.score >= 65 ? 'var(--amber)' : 'var(--red)') + '"></div>'
        + '<span style="font-size:9px;color:var(--t3)">' + contact.score + '</span></div>'
        + '</div></div>';
    });

    html += '</div></div>'; /* pipe-body + pipe-col */
  });

  html += '</div>'; /* pipeline */

  /* Mini funnel summary */
  html += '<div style="display:flex;gap:8px;margin-top:14px;flex-wrap:wrap">';
  stages.forEach(function(s) {
    var val = s.contacts.reduce(function(sm,x){return sm+x.valor;},0);
    html += '<div style="flex:1;min-width:120px;background:var(--s2);border:1px solid var(--b1);border-radius:var(--r2);padding:12px;border-top:2px solid ' + s.cor + '">'
      + '<div style="font-size:9px;font-weight:700;color:' + s.cor + ';text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">' + s.label + '</div>'
      + '<div style="font-family:var(--fh);font-size:18px;font-weight:700">' + s.contacts.length + '</div>'
      + (val > 0 ? '<div style="font-size:10px;color:var(--t3)">' + fmtK(val) + '</div>' : '')
      + '</div>';
  });
  html += '</div>';

  el.innerHTML = html;
}

/* ═══════════════════════════════════════════════

   ═══════════════════════════════════════════════ */
function renderCrmContactos(el) {
  var html = '<div class="sec-hd"><div><div class="sec-title">Contactos</div><div class="sec-sub">' + CONTACTS.length + ' contactos · Ordenados por score</div></div>'
    + '<div style="display:flex;gap:7px">'
    + '<input class="inp" style="width:220px" placeholder="Pesquisar nome, empresa, email…">'

    + '<button class="btn btn-teal btn-sm">+ Novo Contacto</button>'
    + '</div></div>';

  /* Score bar header */
  html += '<div class="card mb14">'
    + '<div style="display:flex;align-items:center;gap:10px;padding-bottom:10px;border-bottom:1px solid var(--b1);margin-bottom:10px">'
    + '<div style="font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:1px;flex:1">Score</div>'

    var initials = c.nome[0] + c.apelido[0];
    html += '<div class="hrow" style="padding:9px 4px;cursor:pointer" onclick="selectedContactId=' + c.id + ';goto(\'crm-ficha\')">'
      + '<div style="display:flex;align-items:center;gap:10px;width:25%">'
      + '<div style="width:20px;text-align:right;flex-shrink:0"><span style="font-family:var(--fh);font-size:13px;font-weight:700;color:' + scoreCol + '">' + c.score + '</span></div>'
      + '<div style="width:24px;height:3px;border-radius:2px;background:var(--s4);overflow:hidden;flex-shrink:0"><div style="height:100%;width:' + c.score + '%;background:' + scoreCol + '"></div></div>'
      + '</div>'
      + '<div style="display:grid;grid-template-columns:3fr 2fr 2fr 1.5fr 1.5fr 1.5fr 80px;gap:12px;flex:1;align-items:center">'
      + '<div style="display:flex;align-items:center;gap:8px"><div class="contact-av" style="width:28px;height:28px;font-size:10px;background:' + c.cor + '18;border:1px solid ' + c.cor + '30;color:' + c.cor + '">' + initials + '</div><div><div style="font-size:12px;font-weight:500;color:var(--t1)">' + c.nome + ' ' + c.apelido + '</div><div style="font-size:10px;color:var(--t3)">' + c.email + '</div></div></div>'
      + '<div style="font-size:12px">' + c.empresa + '</div>'
      + '<div style="font-size:11px;color:var(--t2)">' + c.cargo + '</div>'
      + '<div>' + stageBdg(c.stage) + '</div>'
      + '<div style="font-family:var(--fh);font-size:13px;font-weight:600">' + fmtK(c.valor) + '</div>'
      + '<div style="font-size:11px;color:var(--t2)">' + c.origem + '</div>'
      + '<div style="display:flex;gap:4px"><button class="btn btn-ghost btn-xs" onclick="event.stopPropagation()">Email</button><button class="btn btn-ghost btn-xs" onclick="event.stopPropagation()">Call</button></div>'
      + '</div></div>';
  });

  html += '</div>';
  el.innerHTML = html;
}

/* ═══════════════════════════════════════════════
   CRM — FICHA DE CONTACTO
   ═══════════════════════════════════════════════ */
function renderCrmFicha(el) {
  var contact = CONTACTS.filter(function(x){ return x.id === selectedContactId; })[0];
  if (!contact) { renderCrmContactos(el); return; }

  var initials = contact.nome[0] + contact.apelido[0];
  var scoreCol = contact.score >= 85 ? 'var(--teal)' : contact.score >= 65 ? 'var(--amber)' : 'var(--red)';
  var campanha = CAMPAIGNS.filter(function(x){ return x.id === contact.campanha_id; })[0];
  var proposta = PROPOSTAS.filter(function(x){ return x.contact_id === contact.id; });
  var contrato = CONTRACTS.filter(function(x){ return x.contact_id === contact.id; })[0];

  var stageOptions = ['lead','qualificado','proposta','negociacao','ganho','perdido'];
  var stageLabels  = ['Lead','Qualificado','Proposta','Negociação','Ganho','Perdido'];
  var stageBar = '<div style="display:flex;gap:3px;margin-top:12px">';
  stageOptions.forEach(function(s, i) {
    var isCur = s === contact.stage;
    var isPast= stageOptions.indexOf(contact.stage) > i;
    var col = isCur ? '#00D4B0' : isPast ? '#00D4B040' : 'transparent';
    stageBar += '<div style="flex:1;height:4px;border-radius:2px;background:' + (isCur ? 'var(--teal)' : isPast ? 'var(--teal)' : 'var(--s4)') + '"></div>';
  });
  stageBar += '</div><div style="display:flex;justify-content:space-between;margin-top:4px">'
    + stageOptions.map(function(s,i){
        var isCur = s === contact.stage;
        return '<span style="font-size:8px;color:' + (isCur?'var(--teal)':'var(--t3)') + ';font-weight:' + (isCur?'700':'400') + '">' + stageLabels[i] + '</span>';
      }).join('') + '</div>';

  var html = '<div class="sec-hd">'
    + '<button class="btn btn-ghost btn-xs" onclick="selectedContactId=null;goto(\'crm-contactos\')" style="margin-top:3px">← Contactos</button>'
    + '<div style="flex:1"></div>'
    + '<div style="display:flex;gap:7px">'
    + '<button class="btn btn-ghost btn-sm">Enviar email</button>'
    + '<button class="btn btn-blue btn-sm">Nova proposta</button>'
    + '<button class="btn btn-teal btn-sm" onclick="goto(\'crm-pipeline\')">Ver pipeline</button>'
    + '</div></div>'
    + '<div class="g2">'
    /* LEFT */
    + '<div>'
    + '<div class="card mb12">'
    + '<div style="display:flex;align-items:center;gap:14px;margin-bottom:16px">'
    + '<div class="contact-av" style="width:52px;height:52px;font-size:17px;background:' + contact.cor + '18;border:2px solid ' + contact.cor + '40;color:' + contact.cor + '">' + initials + '</div>'
    + '<div><div style="font-family:var(--fh);font-size:20px;font-weight:800">' + contact.nome + ' ' + contact.apelido + '</div>'
    + '<div style="font-size:12px;color:var(--t2)">' + contact.cargo + ' · ' + contact.empresa + '</div>'
    + '<div style="display:flex;align-items:center;gap:8px;margin-top:4px">' + stageBdg(contact.stage)
    + '<span style="font-size:10px;color:' + scoreCol + ';font-weight:700">Score ' + contact.score + '</span>'
    + '</div></div>'
    + '<div style="margin-left:auto;text-align:right"><div style="font-family:var(--fh);font-size:22px;font-weight:800;color:var(--teal)">' + fmtK(contact.valor) + '</div><div style="font-size:10px;color:var(--t3)">Valor deal</div></div>'
    + '</div>'
    + stageBar
    + '<hr>'
    + '<div class="g2">'
    + '<div><div style="font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Email</div><div style="font-size:12px;color:var(--teal)">' + contact.email + '</div></div>'
    + '<div><div style="font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Telefone</div><div style="font-size:12px">' + contact.tel + '</div></div>'
    + '<div><div style="font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Origem</div><div style="font-size:12px">' + contact.origem + '</div></div>'
    + '<div><div style="font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Última interacção</div><div style="font-size:12px">' + contact.ultima_int + '</div></div>'
    + '</div>'
    + (campanha ? '<div style="margin-top:12px;padding:10px;background:var(--s3);border-radius:var(--r1)"><div style="font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Campanha de origem</div><div style="display:flex;align-items:center;gap:8px"><div style="width:8px;height:8px;border-radius:2px;background:' + campanha.cor + '"></div><span style="font-size:12px;font-weight:500;color:var(--t1)">' + campanha.nome + '</span>' + campBdg(campanha.estado) + '</div></div>' : '')
    + '<div style="margin-top:12px;padding:10px;background:var(--s3);border-radius:var(--r1)"><div style="font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Notas</div><div style="font-size:12px;color:var(--t2);line-height:1.6">' + contact.notas + '</div></div>'
    + '</div>'
    /* Propostas */
    + (proposta.length > 0 ? '<div class="card mb12"><div class="card-title">Propostas</div>'
      + proposta.map(function(p) {
          var stCls = {enviada:'bdg-b',em_rev:'bdg-a',aceite:'bdg-g',recusada:'bdg-r',expirada:'bdg-gr'};
          var stLbl = {enviada:'Enviada',em_rev:'Em revisão',aceite:'Aceite ✓',recusada:'Recusada',expirada:'Expirada'};
          return '<div class="hrow" style="padding:9px 0"><div><div style="font-size:12px;font-weight:500;color:var(--t1)">' + p.numero + ' — ' + p.titulo + '</div><div style="font-size:10px;color:var(--t3)">' + p.data + ' · Válida até ' + p.validade + '</div></div><div style="text-align:right"><div style="font-family:var(--fh);font-size:15px;font-weight:700">' + fmtK(p.valor) + '</div><span class="bdg ' + (stCls[p.estado]||'bdg-gr') + '">' + (stLbl[p.estado]||p.estado) + '</span></div></div>';
        }).join('')
      + '</div>' : '')
    + (contrato ? '<div class="card"><div class="card-title">Contrato Activo</div><div style="padding:12px;background:var(--gb);border-radius:var(--r1);border:1px solid rgba(40,200,122,.2)"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px"><div style="font-size:13px;font-weight:500;color:var(--t1)">' + contrato.plano + ' · ' + fmtK(contrato.mrr) + '/mês</div><span class="bdg bdg-g">Activo</span></div><div style="font-size:11px;color:var(--t2)">Desde ' + contrato.inicio + ' · Renovação ' + contrato.renovacao + '</div><div style="font-size:11px;color:var(--green);margin-top:4px">LTV estimado: ' + fmtK(contrato.ltv_est) + '</div></div></div>' : '')
    + '</div>'
    /* RIGHT */
    + '<div>'
    + '<div class="card mb12"><div class="card-title">Actividade &amp; Histórico</div>';

  ACTIVITIES.filter(function(x){return x.contact_id === contact.id;}).forEach(function(a) {
    html += '<div class="act-item"><div class="act-dot" style="background:' + a.cor + ';box-shadow:0 0 0 3px ' + a.cor + '15"></div><div style="flex:1"><div style="font-size:12px;color:var(--t1)">' + a.texto + '</div><div style="font-size:10px;color:var(--t3);margin-top:2px">' + a.ts + '</div></div></div>';

function renderRevForecast(el) {
  var activeMRR = CONTRACTS.filter(function(x){return x.estado==='ativo';}).reduce(function(s,x){return s+x.mrr;},0);

  /* Generate 12-month forecast */
  var growth = 0.12; /* 12% MoM target */
  var conserv = 0.07, optimist = 0.18;
  var forecastBase = [], forecastCons = [], forecastOpt = [];
  var base = activeMRR;
  for (var i = 0; i < 12; i++) {
    forecastBase.push(Math.round(base * Math.pow(1 + growth,   i)));
    forecastCons.push(Math.round(base * Math.pow(1 + conserv,  i)));
    forecastOpt.push( Math.round(base * Math.pow(1 + optimist, i)));
  }

  var forecastLabels = ['Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez','Jan','Fev','Mar'];

  var html = '<div class="sec-hd"><div><div class="sec-title">Revenue Forecast</div><div class="sec-sub">Projecção 12 meses · Cenários conservador / base / optimista</div></div>'
    + '<div style="display:flex;gap:7px">'
    + '<button class="btn btn-ghost btn-sm">Exportar</button>'
    + '<button class="btn btn-teal btn-sm" onclick="goto(\'rev-deals\')">Ver contratos</button>'
    + '</div></div>'
    + '<div class="g4 mb16">'
    + kpi('MRR actual', fmtK(activeMRR), 'Base do forecast', 'neu', '#00D4B0')
    + kpi('MRR Mar 2027 (base)', fmtK(forecastBase[11]), '+' + fmtPct((forecastBase[11]-activeMRR)/activeMRR), 'up', '#28C87A')
    + kpi('ARR Mar 2027', fmtK(forecastBase[11]*12), 'Projecção anual', 'up')
    + kpi('Break-even target', '€5.000 MRR', 'Jun 2026 (estimado)', 'up', '#00D4B0')
    + '</div>'

  /* Forecast chart */
  + '<div class="card mb16">'
  + '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">'
  + '<div class="card-title" style="margin-bottom:0">Projecção MRR — 12 meses</div>'
  + '<div class="mrr-legend">'

/* ═══════════════════════════════════════════════
   SVG CHART HELPERS
   ═══════════════════════════════════════════════ */
function svgLineChart(opts) {
  /* opts: { width, height, series:[{data,color,label,dashed}], labels, padL, padR, padT, padB, showArea, noGrid } */
  var W = opts.width || 480, H = opts.height || 160;
  var PL = opts.padL || 42, PR = opts.padR || 12, PT = opts.padT || 10, PB = opts.padB || 28;
  var cW = W - PL - PR, cH = H - PT - PB;
  var series = opts.series || [];
  var labels = opts.labels || [];
  var n = labels.length;
  var allVals = [];
  series.forEach(function(s){ s.data.forEach(function(v){ if (v !== null) allVals.push(v); }); });
  var maxV = Math.max.apply(null, allVals) * 1.12;
  var minV = opts.minZero ? 0 : (Math.min.apply(null, allVals) * 0.9);
  if (maxV === minV) maxV = minV + 1;
  var range = maxV - minV;
  var xStep = n > 1 ? cW / (n - 1) : cW;
  var yScale = function(v){ return PT + cH - ((v - minV) / range) * cH; };

  var html = '<svg viewBox="0 0 ' + W + ' ' + H + '" style="width:100%;height:auto;display:block;overflow:visible" xmlns="http://www.w3.org/2000/svg">';

  /* Grid */
  if (!opts.noGrid) {
    var ticks = 4;
    for (var i = 0; i <= ticks; i++) {
      var val = minV + range * (i / ticks);
      var y = yScale(val);
      html += '<line x1="' + PL + '" y1="' + y + '" x2="' + (W - PR) + '" y2="' + y + '" stroke="#22262C" stroke-width="1"/>';
      var lbl = val >= 1000 ? (val/1000).toFixed(0) + 'k' : val.toFixed(0);
      html += '<text x="' + (PL - 4) + '" y="' + (y + 3.5) + '" text-anchor="end" fill="#3E4652" font-size="9" font-family="Barlow,sans-serif">' + lbl + '</text>';
    }
  }

  /* X labels */
  var lStep = Math.max(1, Math.floor(n / 7));
  for (var j = 0; j < n; j += lStep) {
    var xPos = PL + j * xStep;
    html += '<text x="' + xPos + '" y="' + (H - PB + 14) + '" text-anchor="middle" fill="#3E4652" font-size="9" font-family="Barlow,sans-serif">' + (labels[j] || '') + '</text>';
  }

  /* Series */
  series.forEach(function(s) {
    if (!s.data || s.data.length === 0) return;
    var pts = s.data.map(function(v, i){ return [PL + i * xStep, yScale(v)]; });
    var col = s.color || '#00D4B0';
    var pathD = pts.map(function(p, i){ return (i === 0 ? 'M' : 'L') + p[0].toFixed(1) + ',' + p[1].toFixed(1); }).join(' ');

    if (opts.showArea && !s.dashed) {
      var areaD = pathD + ' L' + pts[pts.length-1][0].toFixed(1) + ',' + (PT + cH) + ' L' + pts[0][0].toFixed(1) + ',' + (PT + cH) + ' Z';
      html += '<path d="' + areaD + '" fill="' + col + '" opacity="0.07"/>';
    }
    html += '<path d="' + pathD + '" fill="none" stroke="' + col + '" stroke-width="' + (s.dashed ? 1.5 : 2) + '"' + (s.dashed ? ' stroke-dasharray="4,3"' : '') + '/>';

    if (!s.dashed) {
      pts.forEach(function(p, i) {
        html += '<circle cx="' + p[0].toFixed(1) + '" cy="' + p[1].toFixed(1) + '" r="3" fill="' + col + '" stroke="var(--s2)" stroke-width="1.5"><title>' + (labels[i] || '') + ': €' + (s.data[i] || 0).toLocaleString('pt-PT') + '</title></circle>';
      });
    }
  });

  /* Axes */
  html += '<line x1="' + PL + '" y1="' + PT + '" x2="' + PL + '" y2="' + (PT + cH) + '" stroke="#2E343C" stroke-width="1"/>';
  html += '<line x1="' + PL + '" y1="' + (PT + cH) + '" x2="' + (W - PR) + '" y2="' + (PT + cH) + '" stroke="#2E343C" stroke-width="1"/>';
  html += '</svg>';
  return html;
}

function svgBarChart(opts) {
  /* opts: { data:[{label,value,color}], width, height, horizontal } */
  var W = opts.width || 320, H = opts.height || 140;
  var PL = 42, PR = 12, PT = 10, PB = 26;
  var cW = W - PL - PR, cH = H - PT - PB;
  var data = opts.data || [];
  var n = data.length;
  var maxV = Math.max.apply(null, data.map(function(d){ return d.value; })) * 1.12;
  var barW = (cW / n) * 0.55;
  var gap  = cW / n;

  var html = '<svg viewBox="0 0 ' + W + ' ' + H + '" style="width:100%;height:auto;display:block" xmlns="http://www.w3.org/2000/svg">';

  /* Grid */
  for (var i = 0; i <= 3; i++) {
    var val = maxV * (i / 3);
    var y = PT + cH - (val / maxV) * cH;
    html += '<line x1="' + PL + '" y1="' + y + '" x2="' + (W - PR) + '" y2="' + y + '" stroke="#22262C" stroke-width="1"/>';
    html += '<text x="' + (PL - 4) + '" y="' + (y + 3.5) + '" text-anchor="end" fill="#3E4652" font-size="9" font-family="Barlow,sans-serif">' + (val >= 1000 ? (val/1000).toFixed(0)+'k' : val.toFixed(0)) + '</text>';
  }

  data.forEach(function(d, i) {
    var x = PL + i * gap + (gap - barW) / 2;
    var bH = (d.value / maxV) * cH;
    var y = PT + cH - bH;
    var col = d.color || '#00D4B0';
    html += '<rect x="' + x.toFixed(1) + '" y="' + y.toFixed(1) + '" width="' + barW.toFixed(1) + '" height="' + bH.toFixed(1) + '" fill="' + col + '" opacity="' + (d.active ? 1 : 0.45) + '" rx="2"><title>' + d.label + ': €' + d.value.toLocaleString('pt-PT') + '</title></rect>';
    html += '<text x="' + (x + barW/2).toFixed(1) + '" y="' + (H - PB + 13) + '" text-anchor="middle" fill="' + (d.active ? col : '#3E4652') + '" font-size="9" font-family="Barlow,sans-serif" font-weight="' + (d.active ? '600' : '400') + '">' + d.label + '</text>';
  });

  html += '<line x1="' + PL + '" y1="' + PT + '" x2="' + PL + '" y2="' + (PT + cH) + '" stroke="#2E343C" stroke-width="1"/>';
  html += '<line x1="' + PL + '" y1="' + (PT + cH) + '" x2="' + (W - PR) + '" y2="' + (PT + cH) + '" stroke="#2E343C" stroke-width="1"/>';
  html += '</svg>';
  return html;
}

/* ═══════════════════════════════════════════════

function kpi(lbl, val, chg, updn, valCol, barPct, barCol) {
  var v = valCol ? ' style="color:' + valCol + '"' : '';
  var chgCls = updn || 'neu';
  var bar = barPct !== undefined ? '<div class="kpi-bar"><div class="kpi-bar-fill" style="width:' + barPct + '%;background:' + (barCol || 'var(--teal)') + '"></div></div>' : '';
  return '<div class="kpi"><div class="kpi-lbl">' + lbl + '</div><div class="kpi-val"' + v + '>' + val + '</div>'
    + '<div class="kpi-chg ' + chgCls + '">' + chg + '</div>' + bar + '</div>';
}

function campBdg(estado) {
  var m = { live:'bdg-g', paused:'bdg-a', draft:'bdg-gr', ended:'bdg-r' };
  var l = { live:'Live', paused:'Pausada', draft:'Rascunho', ended:'Terminada' };
  return '<span class="bdg ' + (m[estado]||'bdg-gr') + '"><span class="bdot"></span>' + (l[estado]||estado) + '</span>';
}

function stageBdg(stage) {
  var m = { lead:'bdg-gr', qualificado:'bdg-b', proposta:'bdg-p', negociacao:'bdg-a', ganho:'bdg-g', perdido:'bdg-r' };
  var l = { lead:'Lead', qualificado:'Qualificado', proposta:'Proposta', negociacao:'Negociação', ganho:'Ganho', perdido:'Perdido' };
  return '<span class="bdg ' + (m[stage]||'bdg-gr') + '">' + (l[stage]||stage) + '</span>';
}
