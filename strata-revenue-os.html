function statusLabel(s) {
  var m = { draft:'Rascunho', in_review:'Em revisão', approved:'Aprovado', published:'Publicado', rejected:'Rejeitado' };
  return m[s] || s;
}
function statusBdg(s) {
  var m = { draft:'bdg-gr', in_review:'bdg-a', approved:'bdg-g', published:'bdg-t', rejected:'bdg-r' };
  return '<span class="bdg ' + (m[s]||'bdg-gr') + '">' + statusLabel(s) + '</span>';
}

function renderMktCriar(el) {
  var tabHtml = '<div class="studio-tabs">'
    + studioTabBtn('generate', 'Geração')
    + studioTabBtn('review',   'Revisão & Aprovação <span class="studio-tab-cnt">' + STUDIO_ASSETS.filter(function(a){return a.status==='in_review';}).length + '</span>')
    + studioTabBtn('library',  'Biblioteca <span class="studio-tab-cnt">' + STUDIO_ASSETS.length + '</span>')
    + '</div>';

  var bodyHtml;
  if (studioTab === 'generate') {
    bodyHtml = renderStudioGenerate();
  } else if (studioTab === 'review') {
    bodyHtml = renderStudioReview();
  } else {
    bodyHtml = renderStudioLibrary();
  }

  el.innerHTML = '<div class="sec-hd"><div><div class="sec-title">Creative Studio</div>'
    + '<div class="sec-sub">Geração de imagem e vídeo com IA · Revisão · Aprovação</div></div>'
    + '<div style="display:flex;gap:7px" id="studio-hd-actions"></div></div>'
    + tabHtml
    + bodyHtml;

  updateStudioHeader();
}

function studioTabBtn(id, lbl) {
  var on = studioTab === id;
  return '<button class="studio-tab-btn' + (on ? ' on' : '') + '" onclick="studioTab=\'' + id + '\';renderMktCriar($(\'content\'))">' + lbl + '</button>';
}

function updateStudioHeader() {
  var el = document.getElementById('studio-hd-actions');
  if (!el) return;
  if (studioTab === 'generate') {
    el.innerHTML = '<button class="btn btn-ghost btn-sm" onclick="studioTab=\'library\';renderMktCriar($(\'content\'))">Ver biblioteca</button>'
      + '<button class="btn btn-teal btn-sm" id="gen-btn" onclick="generateCopy()">Gerar com Claude</button>';
  } else if (studioTab === 'review') {
    el.innerHTML = '<button class="btn btn-ok btn-sm" onclick="approveAll()">Aprovar seleccionados</button>';
  } else {
    el.innerHTML = '<button class="btn btn-ghost btn-sm" onclick="studioViewMode=studioViewMode===\'grid\'?\'list\':\'grid\';renderMktCriar($(\'content\'))">Toggle view</button>'
      + '<button class="btn btn-teal btn-sm" onclick="studioTab=\'generate\';renderMktCriar($(\'content\'))">+ Gerar assets</button>';
  }
}

/* ─── GENERATE TAB ─── */
function renderStudioGenerate() {
  /* engine selector */
  var enginesHtml = '<div class="studio-engines">';
  Object.keys(ENGINE_META).forEach(function(k) {
    var e = ENGINE_META[k];
    var on = studioEngine === k;
    enginesHtml += '<button class="engine-btn' + (on ? ' on' : '') + '" onclick="studioEngine=\'' + k + '\';renderMktCriar($(\'content\'))">'
      + '<span class="engine-icon">' + e.icon + '</span>'
      + '<div><div class="engine-name">' + e.label + '</div>'
      + '<div class="engine-desc">' + e.desc + '</div></div>'
      + '<span class="bdg ' + e.tag + ' engine-type-bdg">' + e.type + '</span>'
      + '</button>';
  });
  enginesHtml += '</div>';

  /* aspect ratios */
  var aspectHtml = '<div class="aspect-row">';
  ASPECT_PRESETS.forEach(function(a) {
    var on = studioAspect === a.id;
    var boxW = Math.round(26 * a.w / Math.max(a.w, a.h));
    var boxH = Math.round(26 * a.h / Math.max(a.w, a.h));
    aspectHtml += '<button class="aspect-btn' + (on ? ' on' : '') + '" onclick="studioAspect=\'' + a.id + '\';renderMktCriar($(\'content\'))" title="' + a.use + '">'
      + '<div style="width:' + boxW + 'px;height:' + boxH + 'px;border:1.5px solid currentColor;border-radius:2px"></div>'
      + '<span>' + a.label + '</span>'
      + '</button>';
  });
  aspectHtml += '</div>';

  /* style presets */
  var styleHtml = '<div class="style-grid">';
  STYLE_PRESETS.forEach(function(s) {
    var on = studioStyle === s.id;
    var cols = s.cols.split(',');
    styleHtml += '<button class="style-btn' + (on ? ' on' : '') + '" onclick="studioStyle=\'' + s.id + '\';renderMktCriar($(\'content\'))">'
      + '<div class="style-thumb" style="background:linear-gradient(135deg,' + cols[0] + ',' + cols[1] + ')"></div>'
      + '<span>' + s.label + '</span></button>';
  });
  styleHtml += '</div>';

  /* ai copy suggestion */
  var copyHint = mktCreateData.generated
    ? '<div class="studio-hint"><svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="5.5,1 10,4 10,8 5.5,10.5 1,8 1,4"/><circle cx="5.5" cy="5.5" r="1.5"/></svg>Sugestão de prompt da IA activa — <button onclick="applyAiPrompt()" style="background:none;border:none;color:var(--teal);cursor:pointer;font-size:10px;font-weight:600;padding:0">Aplicar ao gerador →</button></div>'
    : '';

  /* main layout */
  return '<div class="studio-layout">'
    /* ── LEFT PANEL ── */
    + '<div class="studio-left">'
    + '<div class="studio-section-title">Motor de Geração</div>'
    + enginesHtml
    + '<div class="studio-section-title" style="margin-top:16px">Prompt</div>'
    + copyHint
    + '<div class="studio-prompt-wrap">'
    + '<textarea id="studio-prompt" class="studio-textarea" placeholder="Descreve a imagem que queres gerar… quanto mais detalhe, melhor o resultado." oninput="studioPrompt=this.value">' + studioPrompt + '</textarea>'
    + '<button class="studio-enhance-btn" onclick="enhancePrompt()" title="Melhorar prompt com Claude">'
    + '<svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="5.5,1 10,4 10,8 5.5,10.5 1,4"/><circle cx="5.5" cy="5.5" r="1.5"/></svg> Melhorar com IA</button>'
    + '</div>'
    + '<div class="studio-section-title" style="margin-top:14px">Prompt negativo</div>'
    + '<textarea id="studio-neg-prompt" class="studio-textarea" style="min-height:52px" placeholder="O que não queres na imagem… (ex: texto, blur, distorção)" oninput="studioNegPrompt=this.value">' + studioNegPrompt + '</textarea>'
    + '<div class="studio-section-title" style="margin-top:14px">Aspect Ratio</div>'
    + aspectHtml
    + '<div class="studio-section-title" style="margin-top:14px">Estilo</div>'
    + styleHtml
    + '<div class="studio-section-title" style="margin-top:14px">Qualidade & Quantidade</div>'
    + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">'
    + '<div class="fld"><label>Qualidade</label>'
    + '<select class="inp" style="font-size:11px" onchange="studioQuality=this.value">'
    + ['draft','standard','high','ultra'].map(function(q){ return '<option value="' + q + '"' + (studioQuality===q?' selected':'') + '>' + {draft:'Draft (rápido)',standard:'Standard',high:'High Quality',ultra:'Ultra HD'}[q] + '</option>'; }).join('')
    + '</select></div>'
    + '<div class="fld"><label>Quantidade</label>'
    + '<select class="inp" style="font-size:11px"><option>1 imagem</option><option>2 imagens</option><option selected>4 imagens</option></select></div>'
    + '</div>'
    + '<div class="studio-generate-area">'
    + '<button class="studio-gen-btn" id="studio-gen-btn" onclick="simulateGenerate()">'
    + '<svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2"><polygon points="7,1 13,4.5 13,9.5 7,13 1,9.5 1,4.5"/><circle cx="7" cy="7" r="2.5"/></svg>'
    + ' Gerar com ' + ENGINE_META[studioEngine].label
    + '</button>'
    + '<div style="font-size:9px;color:var(--t3);text-align:center;margin-top:6px">~' + {flux:'8s',dalle3:'12s',midj:'25s',sdxl:'6s',ideogram:'10s',runway:'45s',sora:'90s'}[studioEngine] + ' por geração</div>'

    /* ── RIGHT PANEL ── */
    + '<div class="studio-right">'
    + renderStudioCanvas()
    + '</div>'
    + '</div>';

function renderStudioCanvas() {
  var recent = STUDIO_ASSETS.slice().reverse().slice(0, 8);

  var html = '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">'
    + '<div style="font-size:11px;font-weight:600;color:var(--t1)">Resultados recentes</div>'
    + '<div style="display:flex;gap:5px">'
    + '<button class="btn btn-ghost btn-xs" onclick="studioTab=\'library\';renderMktCriar($(\'content\'))">Ver tudo (' + STUDIO_ASSETS.length + ')</button>'
    + '</div></div>'
    + '<div class="studio-canvas" id="studio-canvas">';

  if (studioGenerating) {
    html += renderGeneratingPlaceholders();
  } else {
    var cols = [[], [], []];
    recent.forEach(function(a, i) { cols[i % 3].push(a); });
    html += '<div class="canvas-masonry">';
    cols.forEach(function(col) {
      html += '<div class="canvas-col">';
      col.forEach(function(a) { html += renderAssetThumb(a, true); });
      html += '</div>';
    });
    html += '</div>';
  }
  html += '</div>';
  return html;
}

function renderAssetThumb(a, inCanvas) {
  var aspect = a.aspect || '1:1';
  var parts = aspect.split(':');
  var ratio = (parseInt(parts[1]) / parseInt(parts[0]) * 100).toFixed(1);
  var bg = ASSET_GRADIENTS[a.idx % ASSET_GRADIENTS.length];
  var eng = ENGINE_META[a.engine] || {};

  return '<div class="asset-thumb-wrap ' + (a.isVideo ? 'is-video' : '') + '" onclick="openAssetReview(' + a.id + ')">'
    + '<div class="asset-thumb-img" style="padding-bottom:' + ratio + '%;background:' + bg + '">'
    + '<div class="asset-thumb-inner">'
    + (a.isVideo
        ? '<div class="asset-video-icon"><svg width="20" height="20" viewBox="0 0 20 20" fill="none"><polygon points="8,6 16,10 8,14" fill="currentColor"/><circle cx="10" cy="10" r="9" stroke="currentColor" stroke-width="1.5" fill="none"/></svg></div>'
        : '<div class="asset-thumb-placeholder"><svg width="28" height="28" viewBox="0 0 26 22" fill="none" opacity=".3"><path d="M2 16L13 11L24 16" stroke="#00D4B0" stroke-width="2.5" stroke-linecap="round"/><path d="M2 11L13 6L24 11" stroke="#C0C8D4" stroke-width="2" stroke-linecap="round"/><path d="M2 6L13 1L24 6" stroke="#EEF0F4" stroke-width="1.5" stroke-linecap="round"/></svg></div>')
    + '</div>'
    + '<div class="asset-thumb-overlay">'
    + '<div style="display:flex;gap:5px;flex-wrap:wrap">'
    + statusBdg(a.status)
    + '<span class="bdg ' + (eng.tag||'bdg-gr') + '" style="font-size:8px">' + (eng.label||a.engine) + '</span>'
    + '</div>'
    + '<div style="display:flex;gap:4px;margin-top:6px">'
    + '<button class="asset-action-btn" onclick="event.stopPropagation();toggleLike(' + a.id + ')" title="Like">'
    + (a.liked ? '<svg width="11" height="11" viewBox="0 0 11 11" fill="#F04F5A" stroke="#F04F5A" stroke-width="1"><path d="M5.5 9.5S1 6.5 1 3.5C1 2.1 2.1 1 3.5 1c.8 0 1.5.4 2 1 .5-.6 1.2-1 2-1C8.9 1 10 2.1 10 3.5c0 3-4.5 6-4.5 6z"/></svg>'
    : '<svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5.5 9.5S1 6.5 1 3.5C1 2.1 2.1 1 3.5 1c.8 0 1.5.4 2 1 .5-.6 1.2-1 2-1C8.9 1 10 2.1 10 3.5c0 3-4.5 6-4.5 6z"/></svg>')
    + '</button>'
    + '<button class="asset-action-btn" onclick="event.stopPropagation();openAssetReview(' + a.id + ')" title="Rever">'
    + '<svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="5.5" cy="5.5" r="4.5"/><path d="M5.5 3.5v2.5l2 1"/></svg>'
    + '</button>'
    + '<button class="asset-action-btn" onclick="event.stopPropagation();changeAssetStatus(' + a.id + ',\'approved\')" title="Aprovar">'
    + '<svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1.5 5.5l3 3 5-5"/></svg>'
    + '</button>'
    + '</div></div>'
    + '</div>'
    + (a.comments && a.comments.length ? '<div class="asset-comment-count"><svg width="9" height="9" viewBox="0 0 9 9" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 1h7v5H3.5L1 7.5V6H1V1z"/></svg>' + a.comments.length + '</div>' : '')
    + '</div>';
}

function renderGeneratingPlaceholders() {
  var html = '<div class="canvas-masonry"><div class="canvas-col">';
  for (var i = 0; i < 4; i++) {
    html += '<div class="asset-thumb-wrap">'
      + '<div class="asset-thumb-img generating-pulse" style="padding-bottom:' + [100,133,75,100][i] + '%">'
      + '<div class="asset-thumb-inner"><div class="generating-text">Gerando com ' + ENGINE_META[studioEngine].label + '…</div></div></div></div>';
    if (i === 1) html += '</div><div class="canvas-col">';
    if (i === 2) html += '</div><div class="canvas-col">';
  }
  return html + '</div></div>';
}

/* ─── REVIEW TAB ─── */
function renderStudioReview() {
  var inReview   = STUDIO_ASSETS.filter(function(a){ return a.status === 'in_review'; });
  var drafts     = STUDIO_ASSETS.filter(function(a){ return a.status === 'draft'; });
  var approved   = STUDIO_ASSETS.filter(function(a){ return a.status === 'approved'; });
  var published  = STUDIO_ASSETS.filter(function(a){ return a.status === 'published'; });

  /* if reviewing a single asset */
  if (studioReviewAsset !== null) {
    var a = STUDIO_ASSETS.filter(function(x){ return x.id === studioReviewAsset; })[0];
    if (a) return renderAssetDetailReview(a);
  }

  var html = '<div class="review-board">';

  var columns = [
    { id:'draft',     label:'Rascunho',   color:'var(--t3)', assets: drafts },
    { id:'in_review', label:'Em Revisão', color:'var(--amber)', assets: inReview },
    { id:'approved',  label:'Aprovado',   color:'var(--green)', assets: approved },
    { id:'published', label:'Publicado',  color:'var(--teal)',  assets: published },
  ];

  columns.forEach(function(col) {
    html += '<div class="review-col">'
      + '<div class="review-col-head" style="border-top-color:' + col.color + '">'
      + '<span class="review-col-title" style="color:' + col.color + '">' + col.label + '</span>'
      + '<span class="review-col-count">' + col.assets.length + '</span>'
      + '</div>'
      + '<div class="review-col-body">';

    if (col.assets.length === 0) {
      html += '<div style="padding:20px 12px;text-align:center;color:var(--t3);font-size:11px">Sem assets</div>';
    }

    col.assets.forEach(function(a) {
      var bg = ASSET_GRADIENTS[a.idx % ASSET_GRADIENTS.length];
      var eng = ENGINE_META[a.engine] || {};
      html += '<div class="review-card" onclick="studioReviewAsset=' + a.id + ';renderMktCriar($(\'content\'))">'
        + '<div style="height:90px;background:' + bg + ';border-radius:var(--r1);margin-bottom:8px;position:relative;display:flex;align-items:center;justify-content:center">'
        + (a.isVideo ? '<svg width="24" height="24" viewBox="0 0 24 24" fill="none"><polygon points="10,8 18,12 10,16" fill="var(--pink)"/><circle cx="12" cy="12" r="11" stroke="var(--pink)" stroke-width="1.5" fill="none"/></svg>'
                     : '<svg width="24" height="24" viewBox="0 0 26 22" fill="none" opacity=".4"><path d="M2 16L13 11L24 16" stroke="#00D4B0" stroke-width="2.5" stroke-linecap="round"/><path d="M2 11L13 6L24 11" stroke="#C0C8D4" stroke-width="2" stroke-linecap="round"/></svg>')
        + (a.liked ? '<div style="position:absolute;top:5px;right:5px;color:var(--red);font-size:10px">♥</div>' : '')
        + '</div>'
        + '<div style="font-size:10px;color:var(--t2);line-height:1.4;margin-bottom:6px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical">' + a.prompt + '</div>'
        + '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">'
        + '<span class="bdg ' + (eng.tag||'bdg-gr') + '" style="font-size:8px">' + (eng.label||a.engine) + '</span>'
        + '<span style="font-size:9px;color:var(--t3)">' + a.aspect + '</span>'
        + '</div>'
        + (a.comments.length > 0 ? '<div style="display:flex;align-items:center;gap:4px;font-size:10px;color:var(--t2);padding:5px 0;border-top:1px solid var(--b1)"><svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 1h8v6H3.5L1 9V7H1V1z"/></svg>' + a.comments.length + ' comentário(s)</div>' : '')

        + (col.id === 'in_review' ? '<button class="btn btn-ok btn-xs" style="flex:1;justify-content:center" onclick="event.stopPropagation();changeAssetStatus(' + a.id + ',\'approved\')">Aprovar</button><button class="btn btn-danger btn-xs" onclick="event.stopPropagation();changeAssetStatus(' + a.id + ',\'draft\')">Rejeitar</button>' : '')

function simulateGenerate() {
  var btn = document.getElementById('studio-gen-btn');
  if (!btn || studioGenerating) return;
  studioGenerating = true;
  var canvas = document.getElementById('studio-canvas');
  if (canvas) canvas.innerHTML = renderGeneratingPlaceholders();
  btn.disabled = true;
  btn.innerHTML = '<span class="pulsing">Gerando com ' + ENGINE_META[studioEngine].label + '…</span>';

  var duration = { flux:2000, dalle3:2500, midj:3000, sdxl:1800, ideogram:2200, runway:4000, sora:5000 }[studioEngine] || 2500;

  setTimeout(function() {
    var newIds = [STUDIO_ASSETS.length+1, STUDIO_ASSETS.length+2, STUDIO_ASSETS.length+3, STUDIO_ASSETS.length+4];
    var stylePreset = STYLE_PRESETS.filter(function(s){return s.id===studioStyle;})[0] || STYLE_PRESETS[0];
    var prompt = studioPrompt || ('STRATA Revenue OS — ' + stylePreset.label + ' · Professional B2B');
    newIds.slice(0, studioEngine === 'runway' || studioEngine === 'sora' ? 1 : 4).forEach(function(newId, i) {
      STUDIO_ASSETS.push({
        id:newId, engine:studioEngine, prompt:prompt, aspect:studioAspect, style:studioStyle,
        status:'draft', comments:[], created:today, liked:false, idx:newId, isVideo:studioEngine==='runway'||studioEngine==='sora'
      });
    });
    studioGenerating = false;
    studioTab = 'review';
    renderMktCriar(document.getElementById('content'));
  }, duration);
}

async function enhancePrompt() {
  var inp = document.getElementById('studio-prompt');
  if (!inp || !inp.value.trim()) return;
  var btn = document.querySelector('.studio-enhance-btn');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="pulsing">Melhorando…</span>'; }

  try {
    var res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6', max_tokens:300,
        messages:[{ role:'user', content:'You are an expert AI image prompt engineer. Improve this prompt for ' + ENGINE_META[studioEngine].label + '. Make it more detailed, vivid, and optimized for the ' + studioStyle + ' style. Return ONLY the improved prompt, nothing else.\n\nOriginal: ' + inp.value }]
      })
    });
    var data = await res.json();
    var improved = ((data.content||[])[0]||{}).text || '';
    if (improved) { inp.value = improved; studioPrompt = improved; }
  } catch(e) {
    console.error('Enhance prompt error:', e);
  }

  if (btn) { btn.disabled = false; btn.innerHTML = '<svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="5.5,1 10,4 10,8 5.5,10.5 1,4"/><circle cx="5.5" cy="5.5" r="1.5"/></svg> Melhorar com IA'; }
}

    html += '<div class="g2 mb16">';
    html += '<div class="card"><div class="card-title">Leads por Canal</div>'
      + svgBarChart({ height:160, data: channelRows.map(function(r){ return { label:r.canal.split(' ')[0], value:r.leads, color:r.cor, active:true }; }) })
      + '<div style="margin-top:12px">';
    channelRows.forEach(function(r) {
      var pct = totalLeads > 0 ? Math.round(r.leads / totalLeads * 100) : 0;
      html += '<div style="display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--b1)">'

        + '<span style="font-family:var(--fh);font-size:13px;font-weight:700;color:var(--t1);min-width:24px;text-align:right">' + r.leads + '</span>'
        + '</div>';
    });
    html += '</div></div>';

    /* CPL comparison chart */
    html += '<div class="card"><div class="card-title">CPL por Canal (€)</div>'
      + svgBarChart({ height:160, data: channelRows.filter(function(r){return r.cpl>0;}).map(function(r){ return { label:r.canal.split(' ')[0], value:r.cpl, color:r.cor, active:true }; }) })
      + '<div style="margin-top:12px">';
    channelRows.filter(function(r){return r.cpl>0;}).forEach(function(r) {
      html += '<div style="display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--b1)">'
        + '<div style="width:8px;height:8px;border-radius:2px;background:' + r.cor + ';flex-shrink:0"></div>'
        + '<span style="font-size:12px;color:var(--t1);flex:1">' + r.canal + '</span>'
        + '<div style="width:80px"><div class="prog"><div class="prog-fill" style="width:' + Math.round(r.cpl/40*100) + '%;background:' + r.cor + '"></div></div></div>'
        + '<span style="font-family:var(--fh);font-size:13px;font-weight:700;color:' + r.cor + ';min-width:40px;text-align:right">€' + r.cpl + '</span>'
        + '</div>';
    });
    html += '</div></div>';
    html += '</div>'; /* g2 */

    /* Full channel table */
    html += '<div class="card"><div class="card-title">Tabela Detalhada por Canal</div>'
      + '<div class="tbl-wrap"><table>'
      + '<thead><tr><th>Canal</th><th>Leads</th><th>Quota</th><th>CPL</th><th>Investimento</th><th>Conv. Rate</th><th>CAC est.</th><th>Score eficiência</th></tr></thead>'
      + '<tbody>';
    channelRows.forEach(function(r) {
      var quota = totalLeads > 0 ? (r.leads / totalLeads * 100).toFixed(0) : 0;
      var cac = r.cpl > 0 ? (r.cpl / (r.conv / 100)).toFixed(0) : '—';
      var efficiency = r.spend > 0 ? (r.leads / r.spend * 100).toFixed(1) : '∞';
      var effNum = r.spend > 0 ? r.leads / r.spend * 100 : 99;
      var maxEff = 12; /* normalise bar */
      html += '<tr>'
        + '<td><div style="display:flex;align-items:center;gap:7px"><div style="width:8px;height:8px;border-radius:2px;background:' + r.cor + '"></div><span class="hi">' + r.canal + '</span></div></td>'
        + '<td class="hi">' + r.leads + '</td>'
        + '<td><span class="bdg bdg-gr">' + quota + '%</span></td>'
        + '<td>' + (r.cpl > 0 ? '<span style="color:var(--green);font-weight:600">€' + r.cpl + '</span>' : '<span style="color:var(--teal)">Orgânico</span>') + '</td>'
        + '<td>' + (r.spend > 0 ? fmtK(r.spend) : '—') + '</td>'
        + '<td class="hi">' + (r.conv > 0 ? r.conv.toFixed(1) + '%' : '—') + '</td>'
        + '<td>' + (typeof cac === 'string' ? cac : '€' + cac) + '</td>'
        + '<td><div style="display:flex;align-items:center;gap:7px"><div class="prog" style="width:70px;height:5px"><div class="prog-fill" style="width:' + Math.min(100, effNum/maxEff*100).toFixed(0) + '%;background:' + r.cor + '"></div></div><span style="font-size:10px;color:' + r.cor + ';font-weight:600">' + efficiency + '</span></div></td>'
        + '</tr>';
    });
    html += '</tbody></table></div></div>';

  /* ════════════════════ TAB: YoY ════════════════════ */
  } else if (analyticsTab === 'yoy') {

    /* YoY KPIs */
    var leads26sum  = yoyData.leads26.slice(0,4).reduce(function(s,v){return s+v;},0);
    var leads25sum  = yoyData.leads25.slice(0,4).reduce(function(s,v){return s+v;},0);
    var spend26sum  = yoyData.spend26.slice(0,4).reduce(function(s,v){return s+v;},0);
    var spend25sum  = yoyData.spend25.slice(0,4).reduce(function(s,v){return s+v;},0);
    var cpl26avg    = spend26sum / leads26sum;
    var cpl25avg    = spend25sum / leads25sum;
    var leadsGrowth = leads25sum > 0 ? (leads26sum - leads25sum) / leads25sum : 0;
    var cplImprove  = cpl25avg  > 0 ? (cpl25avg  - cpl26avg)  / cpl25avg  : 0;

    html += '<div class="g4 mb16">'
      + kpi('Leads YTD 2026', String(leads26sum), '+' + fmtPct(leadsGrowth) + ' vs 2025', 'up', '#00D4B0')
      + kpi('Leads YTD 2025', String(leads25sum), 'Período equivalente', 'neu', '#00D4B040')
      + kpi('CPL Médio 2026', '€' + cpl26avg.toFixed(1), '−' + fmtPct(cplImprove) + ' vs 2025', 'up', '#28C87A')
      + kpi('Investimento 2026', fmtK(spend26sum), fmtK(spend26sum - spend25sum) + ' vs 2025', spend26sum > spend25sum ? 'down' : 'up')
      + '</div>';

    /* Leads YoY chart */
    html += '<div class="g2 mb16">';
    html += '<div class="card">'
      + '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">'
      + '<div class="card-title" style="margin-bottom:0">Leads Mensais — 2025 vs 2026</div>'
      + '<div style="display:flex;gap:12px">'
      + '<div style="display:flex;align-items:center;gap:5px;font-size:10px;color:var(--t2)"><div style="width:12px;height:2px;background:#00D4B0;border-radius:1px"></div>2026</div>'
      + '<div style="display:flex;align-items:center;gap:5px;font-size:10px;color:var(--t2)"><div style="width:12px;height:2px;background:#00D4B0;opacity:.4;border-radius:1px;border:1px dashed #00D4B0"></div>2025</div>'
      + '</div></div>'
      + svgLineChart({ labels:MESES, height:160, showArea:true, minZero:true, series:[
          { data:yoyData.leads26, color:'#00D4B0', label:'Leads 2026' },
          { data:yoyData.leads25, color:'#00D4B0', label:'Leads 2025', dashed:true },
        ]})
      + '<div style="display:flex;gap:16px;margin-top:10px;padding-top:10px;border-top:1px solid var(--b1)">'
      + '<div><div style="font-size:9px;color:var(--t3)">Total 2026 YTD</div><div style="font-family:var(--fh);font-size:16px;font-weight:700;color:var(--teal)">' + leads26sum + '</div></div>'
      + '<div><div style="font-size:9px;color:var(--t3)">Total 2025 YTD</div><div style="font-family:var(--fh);font-size:16px;font-weight:700;color:var(--t2)">' + leads25sum + '</div></div>'
      + '<div><div style="font-size:9px;color:var(--t3)">Crescimento YoY</div><div style="font-family:var(--fh);font-size:16px;font-weight:700;color:var(--green)">+' + fmtPct(leadsGrowth) + '</div></div>'
      + '</div></div>';

    /* CPL YoY chart */
    html += '<div class="card">'
      + '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">'
      + '<div class="card-title" style="margin-bottom:0">CPL Médio — 2025 vs 2026 (€)</div>'
      + '<div style="display:flex;gap:12px">'
      + '<div style="display:flex;align-items:center;gap:5px;font-size:10px;color:var(--t2)"><div style="width:12px;height:2px;background:#28C87A;border-radius:1px"></div>2026</div>'
      + '<div style="display:flex;align-items:center;gap:5px;font-size:10px;color:var(--t2)"><div style="width:12px;height:2px;background:#F5A623;opacity:.6;border-radius:1px;border:1px dashed #F5A623"></div>2025</div>'
      + '</div></div>'
      + svgLineChart({ labels:MESES, height:160, showArea:false, minZero:true, series:[
          { data:yoyData.cpl26, color:'#28C87A', label:'CPL 2026' },
          { data:yoyData.cpl25, color:'#F5A623', label:'CPL 2025', dashed:true },
        ]})
      + '<div style="display:flex;gap:16px;margin-top:10px;padding-top:10px;border-top:1px solid var(--b1)">'
      + '<div><div style="font-size:9px;color:var(--t3)">CPL médio 2026</div><div style="font-family:var(--fh);font-size:16px;font-weight:700;color:var(--green)">€' + cpl26avg.toFixed(1) + '</div></div>'
      + '<div><div style="font-size:9px;color:var(--t3)">CPL médio 2025</div><div style="font-family:var(--fh);font-size:16px;font-weight:700;color:var(--amber)">€' + cpl25avg.toFixed(1) + '</div></div>'
      + '<div><div style="font-size:9px;color:var(--t3)">Melhoria</div><div style="font-family:var(--fh);font-size:16px;font-weight:700;color:var(--green)">−' + fmtPct(cplImprove) + '</div></div>'
      + '</div></div>';

    html += '</div>'; /* g2 */

    /* Month-by-month YoY table */
    html += '<div class="card"><div class="card-title">Comparação Mês a Mês — 2025 vs 2026</div>'
      + '<div class="tbl-wrap"><table>'
      + '<thead><tr><th>Mês</th><th>Leads 2026</th><th>Leads 2025</th><th>Δ Leads</th><th>CPL 2026</th><th>CPL 2025</th><th>Δ CPL</th><th>Invest. 2026</th><th>Invest. 2025</th></tr></thead>'
      + '<tbody>';

    MESES.forEach(function(mes, i) {
      var l26 = yoyData.leads26[i], l25 = yoyData.leads25[i];
      var c26 = yoyData.cpl26[i],   c25 = yoyData.cpl25[i];
      var s26 = yoyData.spend26[i], s25 = yoyData.spend25[i];
      var dL = l25 > 0 ? ((l26 - l25) / l25 * 100).toFixed(0) : '—';
      var dC = c25 > 0 ? ((c26 - c25) / c25 * 100).toFixed(0) : '—';
      var isCur = i === 3; /* Abril */
      html += '<tr' + (isCur ? ' style="background:var(--s3)"' : '') + '>'
        + '<td class="hi">' + mes + (isCur ? ' <span class="bdg bdg-t" style="margin-left:4px">Actual</span>' : '') + '</td>'
        + '<td style="color:var(--teal);font-weight:600">' + l26 + '</td>'
        + '<td style="color:var(--t2)">' + l25 + '</td>'
        + '<td style="color:' + (Number(dL) >= 0 ? 'var(--green)' : 'var(--red)') + ';font-weight:600">' + (Number(dL) >= 0 ? '+' : '') + dL + '%</td>'
        + '<td style="color:var(--green);font-weight:600">€' + c26 + '</td>'
        + '<td style="color:var(--t2)">€' + c25 + '</td>'
        + '<td style="color:' + (Number(dC) <= 0 ? 'var(--green)' : 'var(--red)') + ';font-weight:600">' + (Number(dC) <= 0 ? '' : '+') + dC + '%</td>'
        + '<td style="font-size:11px">' + fmtK(s26) + '</td>'
        + '<td style="font-size:11px;color:var(--t2)">' + fmtK(s25) + '</td>'
        + '</tr>';
    });

    html += '</tbody></table></div></div>';
  }

  el.innerHTML = html;
}


/* ═══════════════════════════════════════════════
   CRM — PIPELINE
   ═══════════════════════════════════════════════ */
function renderCrmPipeline(el) {
  var stages = [
    { id:'lead',       label:'Lead',        cor:'#7A8494', contacts: CONTACTS.filter(function(x){return x.stage==='lead';}) },
    { id:'qualificado',label:'Qualificado', cor:'#4E9CF5', contacts: CONTACTS.filter(function(x){return x.stage==='qualificado';}) },
    { id:'proposta',   label:'Proposta',    cor:'#9B6BF2', contacts: CONTACTS.filter(function(x){return x.stage==='proposta';}) },
    { id:'negociacao', label:'Negociação',  cor:'#F5A623', contacts: CONTACTS.filter(function(x){return x.stage==='negociacao';}) },
    { id:'ganho',      label:'Ganho',       cor:'#28C87A', contacts: CONTACTS.filter(function(x){return x.stage==='ganho';}) },
  ];

  var totalPipeline = CONTACTS.filter(function(x){return x.stage !== 'ganho' && x.stage !== 'perdido';}).reduce(function(s,x){return s+x.valor;},0);

  var html = '<div class="sec-hd"><div><div class="sec-title">Pipeline de Vendas</div><div class="sec-sub">€' + fmtN(totalPipeline) + ' em pipeline · 8 deals activos</div></div>'
    + '<div style="display:flex;gap:7px">'
    + '<button class="btn btn-ghost btn-sm" onclick="goto(\'crm-contactos\')">Ver contactos</button>'
    + '<button class="btn btn-blue btn-sm" onclick="goto(\'crm-propostas\')">Propostas</button>'
    + '<button class="btn btn-teal btn-sm">+ Novo Deal</button>'
    + '</div></div>'
    + '<div class="pipeline">';

  stages.forEach(function(s) {
    var stageVal = s.contacts.reduce(function(sum,x){return sum+x.valor;},0);
    html += '<div class="pipe-col">'
      + '<div class="pipe-head" style="border-top:2px solid ' + s.cor + '">'
      + '<div><div class="pipe-name" style="color:' + s.cor + '">' + s.label + '</div>'
      + '<div style="font-size:10px;color:var(--t3);margin-top:1px">' + (stageVal > 0 ? fmtK(stageVal) : '') + '</div></div>'
      + '<span class="pipe-count">' + s.contacts.length + '</span>'
      + '</div>'
      + '<div class="pipe-body">';

    if (s.contacts.length === 0) {
      html += '<div style="padding:20px;text-align:center;color:var(--t3);font-size:11px">Sem deals nesta fase</div>';
    }
    s.contacts.forEach(function(contact) {
      var daysAgo = Math.floor(Math.random() * 14) + 1;
      html += '<div class="deal-card ' + (contact.score >= 85 ? 'hot' : '') + '" onclick="selectedContactId=' + contact.id + ';goto(\'crm-ficha\')">'
        + '<div class="deal-age">' + daysAgo + 'd</div>'
        + '<div class="deal-co">' + contact.empresa + '</div>'
        + '<div class="deal-val" style="color:' + s.cor + '">' + fmtK(contact.valor) + '</div>'
        + '<div class="deal-meta">' + contact.nome + ' ' + contact.apelido + ' · ' + contact.cargo + '</div>'
        + '<div style="display:flex;align-items:center;justify-content:space-between;margin-top:7px">'
        + '<div style="font-size:9px;color:var(--t3)">' + contact.origem + '</div>'
        + '<div style="display:flex;align-items:center;gap:4px">'
        + '<div style="width:' + (contact.score > 70 ? 22 : 16) + 'px;height:4px;border-radius:2px;background:' + (contact.score >= 85 ? 'var(--teal)' : contact.score >= 65 ? 'var(--amber)' : 'var(--red)') + '"></div>'
        + '<span style="font-size:9px;color:var(--t3)">' + contact.score + '</span></div>'
        + '</div></div>';
    });

    html += '</div></div>'; /* pipe-body + pipe-col */
  });

  html += '</div>'; /* pipeline */

  /* Mini funnel summary */
  html += '<div style="display:flex;gap:8px;margin-top:14px;flex-wrap:wrap">';
  stages.forEach(function(s) {
    var val = s.contacts.reduce(function(sm,x){return sm+x.valor;},0);
    html += '<div style="flex:1;min-width:120px;background:var(--s2);border:1px solid var(--b1);border-radius:var(--r2);padding:12px;border-top:2px solid ' + s.cor + '">'
      + '<div style="font-size:9px;font-weight:700;color:' + s.cor + ';text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">' + s.label + '</div>'
      + '<div style="font-family:var(--fh);font-size:18px;font-weight:700">' + s.contacts.length + '</div>'
      + (val > 0 ? '<div style="font-size:10px;color:var(--t3)">' + fmtK(val) + '</div>' : '')
      + '</div>';
  });
  html += '</div>';

  el.innerHTML = html;
}

/* ═══════════════════════════════════════════════
   CRM — CONTACTOS
   ═══════════════════════════════════════════════ */
function renderCrmContactos(el) {

    + '<div style="display:flex;gap:7px">'

    + '<button class="btn btn-teal btn-sm">+ Novo Contacto</button>'
    + '</div></div>';

  /* Score bar header */
  html += '<div class="card mb14">'
    + '<div style="display:flex;align-items:center;gap:10px;padding-bottom:10px;border-bottom:1px solid var(--b1);margin-bottom:10px">'
    + '<div style="font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:1px;flex:1">Score</div>'
    + '<div style="font-size:9px;color:var(--t3);display:grid;grid-template-columns:3fr 2fr 2fr 1.5fr 1.5fr 1.5fr 80px;gap:12px;width:75%">'

    html += '<div class="hrow" style="padding:9px 4px;cursor:pointer" onclick="selectedContactId=' + c.id + ';goto(\'crm-ficha\')">'
      + '<div style="display:flex;align-items:center;gap:10px;width:25%">'
      + '<div style="width:20px;text-align:right;flex-shrink:0"><span style="font-family:var(--fh);font-size:13px;font-weight:700;color:' + scoreCol + '">' + c.score + '</span></div>'
      + '<div style="width:24px;height:3px;border-radius:2px;background:var(--s4);overflow:hidden;flex-shrink:0"><div style="height:100%;width:' + c.score + '%;background:' + scoreCol + '"></div></div>'
      + '</div>'
      + '<div style="display:grid;grid-template-columns:3fr 2fr 2fr 1.5fr 1.5fr 1.5fr 80px;gap:12px;flex:1;align-items:center">'
      + '<div style="display:flex;align-items:center;gap:8px"><div class="contact-av" style="width:28px;height:28px;font-size:10px;background:' + c.cor + '18;border:1px solid ' + c.cor + '30;color:' + c.cor + '">' + initials + '</div><div><div style="font-size:12px;font-weight:500;color:var(--t1)">' + c.nome + ' ' + c.apelido + '</div><div style="font-size:10px;color:var(--t3)">' + c.email + '</div></div></div>'
      + '<div style="font-size:12px">' + c.empresa + '</div>'
      + '<div style="font-size:11px;color:var(--t2)">' + c.cargo + '</div>'
      + '<div>' + stageBdg(c.stage) + '</div>'
      + '<div style="font-family:var(--fh);font-size:13px;font-weight:600">' + fmtK(c.valor) + '</div>'
      + '<div style="font-size:11px;color:var(--t2)">' + c.origem + '</div>'
      + '<div style="display:flex;gap:4px"><button class="btn btn-ghost btn-xs" onclick="event.stopPropagation()">Email</button><button class="btn btn-ghost btn-xs" onclick="event.stopPropagation()">Call</button></div>'
      + '</div></div>';
  });

  html += '</div>';
  el.innerHTML = html;
}

/* ═══════════════════════════════════════════════
   CRM — FICHA DE CONTACTO
   ═══════════════════════════════════════════════ */
function renderCrmFicha(el) {
  var contact = CONTACTS.filter(function(x){ return x.id === selectedContactId; })[0];
  if (!contact) { renderCrmContactos(el); return; }

  var initials = contact.nome[0] + contact.apelido[0];
  var scoreCol = contact.score >= 85 ? 'var(--teal)' : contact.score >= 65 ? 'var(--amber)' : 'var(--red)';
  var campanha = CAMPAIGNS.filter(function(x){ return x.id === contact.campanha_id; })[0];
  var proposta = PROPOSTAS.filter(function(x){ return x.contact_id === contact.id; });
  var contrato = CONTRACTS.filter(function(x){ return x.contact_id === contact.id; })[0];

  var stageOptions = ['lead','qualificado','proposta','negociacao','ganho','perdido'];
  var stageLabels  = ['Lead','Qualificado','Proposta','Negociação','Ganho','Perdido'];
  var stageBar = '<div style="display:flex;gap:3px;margin-top:12px">';
  stageOptions.forEach(function(s, i) {
    var isCur = s === contact.stage;
    var isPast= stageOptions.indexOf(contact.stage) > i;
    var col = isCur ? '#00D4B0' : isPast ? '#00D4B040' : 'transparent';
    stageBar += '<div style="flex:1;height:4px;border-radius:2px;background:' + (isCur ? 'var(--teal)' : isPast ? 'var(--teal)' : 'var(--s4)') + '"></div>';
  });
  stageBar += '</div><div style="display:flex;justify-content:space-between;margin-top:4px">'
    + stageOptions.map(function(s,i){
        var isCur = s === contact.stage;
        return '<span style="font-size:8px;color:' + (isCur?'var(--teal)':'var(--t3)') + ';font-weight:' + (isCur?'700':'400') + '">' + stageLabels[i] + '</span>';
      }).join('') + '</div>';

  var html = '<div class="sec-hd">'
    + '<button class="btn btn-ghost btn-xs" onclick="selectedContactId=null;goto(\'crm-contactos\')" style="margin-top:3px">← Contactos</button>'
    + '<div style="flex:1"></div>'
    + '<div style="display:flex;gap:7px">'
    + '<button class="btn btn-ghost btn-sm">Enviar email</button>'
    + '<button class="btn btn-blue btn-sm">Nova proposta</button>'
    + '<button class="btn btn-teal btn-sm" onclick="goto(\'crm-pipeline\')">Ver pipeline</button>'
    + '</div></div>'
    + '<div class="g2">'
    /* LEFT */

/* ═══════════════════════════════════════════════
   REVENUE — DASHBOARD MRR
   ═══════════════════════════════════════════════ */
function renderRevDash(el) {
  var activeContracts = CONTRACTS.filter(function(x){return x.estado==='ativo';});
  var mrr  = activeContracts.reduce(function(s,x){return s+x.mrr;},0);
  var arr  = mrr * 12;
  var churnContracts = CONTRACTS.filter(function(x){return x.estado==='churn';});
  var churnMRR = churnContracts.reduce(function(s,x){return s+x.mrr;},0);
  var churnRate = mrr > 0 ? churnMRR / (mrr + churnMRR) : 0;
  var avgLTV = activeContracts.reduce(function(s,x){return s+x.ltv_est;},0) / (activeContracts.length || 1);
  var atrasado = CONTRACTS.filter(function(x){return x.pagamentos==='atrasado';});

  var html = '<div class="sec-hd"><div><div class="sec-title">Revenue Dashboard</div><div class="sec-sub">MRR · ARR · Churn · LTV · CAC</div></div>'
    + '<div style="display:flex;gap:7px">'
    + '<button class="btn btn-ghost btn-sm" onclick="goto(\'rev-forecast\')">Forecast →</button>'
    + '<button class="btn btn-teal btn-sm" onclick="goto(\'rev-deals\')">Ver contratos</button>'
    + '</div></div>'
    + '<div class="g4 mb16">'
    + kpi('MRR', fmtK(mrr), '+' + fmtK(mrr - MRR_HISTORY[MRR_HISTORY.length-2]) + ' vs Março', 'up', '#00D4B0', mrr/3500*100)
    + kpi('ARR', fmtK(arr), 'Projecção anual', 'up', null, arr/42000*100)
    + kpi('Churn Rate', fmtPct(churnRate), churnContracts.length + ' contrato(s) perdido(s)', churnRate < 0.05 ? 'up' : 'down', churnRate < 0.05 ? '#28C87A' : '#F04F5A')
    + kpi('LTV Médio', fmtK(avgLTV), 'Activos estimados', 'up', null, 70)
    + '</div>'

  /* MRR Waterfall */
  var html2 = '<div class="g2 mb16">';
  html2 += '<div class="card"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">'
    + '<div class="card-title" style="margin-bottom:0">Evolução MRR</div>'
    + '<div class="mrr-legend">'
    + '<div class="mrr-legend-item"><div class="mrr-dot" style="background:#00D4B0"></div>2026</div>'
    + '<div class="mrr-legend-item"><div class="mrr-dot" style="background:#00D4B040;border:1px dashed #00D4B0"></div>2025</div>'
    + '</div></div>'
    + svgLineChart({ labels:MESES, height:160, showArea:true, minZero:true, series:[
        { data:MRR_HISTORY, color:'#00D4B0', label:'MRR 2026' },
        { data:MRR_2025,    color:'#00D4B0', label:'MRR 2025', dashed:true },
      ]})
    + '<div style="display:flex;gap:16px;margin-top:8px;padding-top:8px;border-top:1px solid var(--b1)">'
    + '<div><div style="font-size:9px;color:var(--t3)">MRR Actual</div><div style="font-family:var(--fh);font-size:16px;font-weight:700;color:var(--teal)">' + fmtK(mrr) + '</div></div>'
    + '<div><div style="font-size:9px;color:var(--t3)">YoY Growth</div><div style="font-family:var(--fh);font-size:16px;font-weight:700;color:var(--green)">+72%</div></div>'
    + '<div><div style="font-size:9px;color:var(--t3)">ARPU</div><div style="font-family:var(--fh);font-size:16px;font-weight:700">' + fmtK(mrr / activeContracts.length) + '</div></div>'
    + '</div></div>';

  /* MRR Waterfall chart this month */
  var newMRR = 1849; /* Porto Ventures + Element */
  var expanMRR = 0;
  var churnMRRAct = churnMRR;
  var waterfall = [
    { label:'MRR Mar', value: MRR_HISTORY[MRR_HISTORY.length-2], color:'#4E9CF5', active:false },
    { label:'Novo',    value: newMRR,   color:'#28C87A', active:true },
    { label:'Expansão',value: expanMRR, color:'#00D4B0', active:false },
    { label:'Churn',   value: churnMRRAct, color:'#F04F5A', active:false },
    { label:'MRR Abr', value: mrr,      color:'#00D4B0', active:true },
  ];
  html2 += '<div class="card"><div class="card-title">Waterfall MRR — Abril 2026</div>'
    + svgBarChart({ height:160, data:waterfall })
    + '<div style="display:flex;gap:12px;margin-top:10px;flex-wrap:wrap">'
    + '<div><div style="font-size:9px;color:var(--t3)">New MRR</div><div style="font-family:var(--fh);font-size:14px;font-weight:700;color:var(--green)">+' + fmtK(newMRR) + '</div></div>'
    + '<div><div style="font-size:9px;color:var(--t3)">Churn MRR</div><div style="font-family:var(--fh);font-size:14px;font-weight:700;color:var(--red)">−' + fmtK(churnMRRAct) + '</div></div>'
    + '<div><div style="font-size:9px;color:var(--t3)">Net New MRR</div><div style="font-family:var(--fh);font-size:14px;font-weight:700;color:var(--teal)">+' + fmtK(newMRR - churnMRRAct) + '</div></div>'
    + '</div></div>';
  html2 += '</div>'; /* g2 */
  html += html2;

  /* Contracts + KPIs */
  html += '<div class="g2">';

  /* Contracts by plan */
  var planBreakdown = {};
  activeContracts.forEach(function(c){
    if (!planBreakdown[c.plano]) planBreakdown[c.plano] = {n:0,mrr:0};
    planBreakdown[c.plano].n++;
    planBreakdown[c.plano].mrr += c.mrr;
  });
  html += '<div class="card"><div class="card-title">MRR por Plano</div>';
  var planCors = { Scale:'#00D4B0', Pro:'#4E9CF5', Starter:'#9B6BF2' };
  Object.keys(planBreakdown).forEach(function(plan) {
    var p = planBreakdown[plan];
    var pct = mrr > 0 ? Math.round(p.mrr / mrr * 100) : 0;
    html += '<div style="margin-bottom:12px">'
      + '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px">'
      + '<span style="color:var(--t1);font-weight:500">' + plan + ' (' + p.n + ' clientes)</span>'
      + '<span style="font-family:var(--fh);font-weight:700;color:' + (planCors[plan]||'var(--teal)') + '">' + fmtK(p.mrr) + ' · ' + pct + '%</span>'
      + '</div><div class="prog" style="height:6px"><div class="prog-fill" style="width:' + pct + '%;background:' + (planCors[plan]||'var(--teal)') + '"></div></div>'
      + '</div>';
  });
  if (atrasado.length > 0) {
    html += '<div class="alert alert-warn" style="margin-top:10px"><svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6.5 1l5.5 10H1L6.5 1z"/></svg><div style="font-size:11px">' + atrasado.length + ' pagamento(s) em atraso — <button class="btn btn-warn btn-xs" style="margin-left:4px" onclick="goto(\'rev-recorrente\')">Ver cobranças</button></div></div>';
  }
  html += '</div>';

  /* Health indicators */
  html += '<div class="card"><div class="card-title">Indicadores de Saúde</div>';
  var indics = [
    { lbl:'CAC (Marketing spend / novos clientes)', val:'€' + Math.round(CAMPAIGNS.reduce(function(s,x){return s+x.spent;},0)/activeContracts.length), updn:'up' },
    { lbl:'LTV/CAC ratio', val:'4.2×', updn:'up' },
    { lbl:'Payback period', val:'8 meses', updn:'up' },
    { lbl:'NPS estimado', val:'62', updn:'up' },
    { lbl:'Clientes em expansão', val:'0', updn:'neu' },
    { lbl:'Taxa renovação', val:'88%', updn:'up' },
  ];
  indics.forEach(function(ind) {
    html += '<div class="srow"><span style="font-size:11px;color:var(--t2)">' + ind.lbl + '</span><span style="font-weight:600;color:var(--t1)">' + ind.val + '</span></div>';
  });
  html += '</div></div>'; /* g2 */

  el.innerHTML = html;
}

  html += '<div class="g2">';
  html += '<div class="card"><div class="card-title">Próximas Faturas — Maio 2026</div>'
    + '<div class="tbl-wrap"><table><thead><tr><th>Empresa</th><th>Plano</th><th>Valor</th><th>Data Emissão</th><th>Estado</th></tr></thead><tbody>';

  activeC.forEach(function(c) {
    html += '<tr>'
      + '<td class="hi">' + c.empresa + '</td>'
      + '<td><span class="bdg bdg-t">' + c.plano + '</span></td>'
      + '<td style="font-family:var(--fh);font-weight:600">' + fmtK(c.mrr) + '</td>'
      + '<td style="font-size:11px">1 Mai 2026</td>'
      + '<td><span class="bdg bdg-gr">Programada</span></td>'
      + '</tr>';
  });
  html += '</tbody></table></div>'
    + '<div style="margin-top:12px;display:flex;gap:7px">'
    + '<button class="btn btn-teal btn-sm" onclick="emitirFaturas(this)">Emitir todas (1 Mai)</button>'
    + '<button class="btn btn-ghost btn-sm">Exportar</button>'
    + '</div></div>';

  /* Dunning / collections */
  html += '<div><div class="card mb12"><div class="card-title">Cobranças em Atraso</div>';
  if (atrasado.length === 0) {
    html += '<div style="text-align:center;padding:24px;color:var(--t3);font-size:12px">✓ Sem cobranças em atraso</div>';
  } else {
    atrasado.forEach(function(c) {
      html += '<div style="padding:10px;background:var(--rb);border-radius:var(--r1);margin-bottom:8px;border:1px solid rgba(240,79,90,.2)">'
        + '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">'
        + '<div><div style="font-size:12px;font-weight:500;color:var(--t1)">' + c.empresa + '</div><div style="font-size:10px;color:var(--red)">Em atraso desde 1 Mar 2026</div></div>'
        + '<div style="font-family:var(--fh);font-size:16px;font-weight:700;color:var(--red)">' + fmtK(c.mrr) + '</div></div>'
        + '<div style="display:flex;gap:6px"><button class="btn btn-danger btn-xs">Enviar reminder</button><button class="btn btn-ghost btn-xs">Contactar</button></div>'
        + '</div>';
    });
  }
  html += '</div>';

  /* Dunning timeline */
  html += '<div class="card"><div class="card-title">Política de Dunning</div>'
    + [['Dia 1','Fatura emitida automaticamente','var(--teal)'],['Dia 3','Email de confirmação de pagamento','var(--blue)'],['Dia 10','Lembrete amigável — email + SMS','var(--amber)'],['Dia 20','Segundo aviso — suspensão iminente','var(--red)'],['Dia 30','Suspensão da conta · Email final','var(--red)']].map(function(d){
        return '<div style="display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--b1)">'
          + '<div style="font-size:10px;font-weight:700;color:' + d[2] + ';min-width:44px">Dia ' + d[0].replace('Dia ','') + '</div>'
          + '<div style="font-size:11px;color:var(--t2)">' + d[1] + '</div></div>';
      }).join('')
    + '</div></div>';
  html += '</div></div>'; /* g2 */
  el.innerHTML = html;
}

function emitirFaturas(btn) {
  flashBtn(btn, 'Faturas emitidas!', 'var(--green)');
}

/* ═══════════════════════════════════════════════
   REVENUE — FORECAST
   ═══════════════════════════════════════════════ */
function renderRevForecast(el) {
  var activeMRR = CONTRACTS.filter(function(x){return x.estado==='ativo';}).reduce(function(s,x){return s+x.mrr;},0);

  /* Generate 12-month forecast */
  var growth = 0.12; /* 12% MoM target */
  var conserv = 0.07, optimist = 0.18;
  var forecastBase = [], forecastCons = [], forecastOpt = [];
  var base = activeMRR;
  for (var i = 0; i < 12; i++) {
    forecastBase.push(Math.round(base * Math.pow(1 + growth,   i)));
    forecastCons.push(Math.round(base * Math.pow(1 + conserv,  i)));
    forecastOpt.push( Math.round(base * Math.pow(1 + optimist, i)));
  }

  var forecastLabels = ['Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez','Jan','Fev','Mar'];

  var html = '<div class="sec-hd"><div><div class="sec-title">Revenue Forecast</div><div class="sec-sub">Projecção 12 meses · Cenários conservador / base / optimista</div></div>'
    + '<div style="display:flex;gap:7px">'
    + '<button class="btn btn-ghost btn-sm">Exportar</button>'
    + '<button class="btn btn-teal btn-sm" onclick="goto(\'rev-deals\')">Ver contratos</button>'
    + '</div></div>'
    + '<div class="g4 mb16">'
    + kpi('MRR actual', fmtK(activeMRR), 'Base do forecast', 'neu', '#00D4B0')
    + kpi('MRR Mar 2027 (base)', fmtK(forecastBase[11]), '+' + fmtPct((forecastBase[11]-activeMRR)/activeMRR), 'up', '#28C87A')
    + kpi('ARR Mar 2027', fmtK(forecastBase[11]*12), 'Projecção anual', 'up')
    + kpi('Break-even target', '€5.000 MRR', 'Jun 2026 (estimado)', 'up', '#00D4B0')
    + '</div>'

  /* Forecast chart */
  + '<div class="card mb16">'
  + '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">'
  + '<div class="card-title" style="margin-bottom:0">Projecção MRR — 12 meses</div>'
  + '<div class="mrr-legend">'
  + '<div class="mrr-legend-item"><div class="mrr-dot" style="background:#28C87A"></div>Optimista (+18%/mês)</div>'
  + '<div class="mrr-legend-item"><div class="mrr-dot" style="background:#00D4B0"></div>Base (+12%/mês)</div>'
  + '<div class="mrr-legend-item"><div class="mrr-dot" style="background:#4E9CF5"></div>Conservador (+7%/mês)</div>'
  + '</div></div>'
  + svgLineChart({ labels:forecastLabels, height:200, showArea:false, minZero:true, series:[
      { data:forecastOpt,  color:'#28C87A', label:'Optimista', dashed:true },
      { data:forecastBase, color:'#00D4B0', label:'Base' },
      { data:forecastCons, color:'#4E9CF5', label:'Conservador', dashed:true },
    ]})
  + '</div>';

  /* Forecast table */
  html += '<div class="g2">';
  html += '<div class="card"><div class="card-title">Tabela de Projecção</div>'
    + '<div class="tbl-wrap"><table><thead><tr><th>Mês</th><th>Conservador</th><th>Base</th><th>Optimista</th><th>ARR Base</th></tr></thead><tbody>';
  forecastLabels.forEach(function(lbl, i) {
    var isCur = i === 0;
    html += '<tr' + (isCur?' style="background:var(--s3)"':'') + '>'
      + '<td class="hi">' + lbl + ' ' + (i < 9 ? '2026' : '2027') + (isCur?' <span class="bdg bdg-t" style="margin-left:4px">Actual</span>':'') + '</td>'
      + '<td style="color:var(--blue)">' + fmtK(forecastCons[i]) + '</td>'
      + '<td style="font-weight:' + (isCur?'700':'400') + ';color:var(--teal)">' + fmtK(forecastBase[i]) + '</td>'
      + '<td style="color:var(--green)">' + fmtK(forecastOpt[i]) + '</td>'
      + '<td style="font-size:11px;color:var(--t2)">' + fmtK(forecastBase[i]*12) + '</td>'
      + '</tr>';
  });
  html += '</tbody></table></div></div>';

  /* Key assumptions */
  html += '<div class="card"><div class="card-title">Premissas do Modelo</div>'
    + [
        ['Crescimento MRR (base)','12% mês · Modelo +expansão'],
        ['Churn mensal estimado','2–3% dos contratos'],
        ['ARPU evolução','+15% anual por upsell'],
        ['Novo negócio (leads)','15–20 leads/mês → 4 deals/mês'],
        ['Ciclo de venda médio','24 dias lead-to-close'],
        ['CAC target','< €250 por cliente'],
        ['LTV/CAC target','> 3×'],
      ].map(function(row){
        return '<div class="srow"><span style="font-size:11px;color:var(--t2)">' + row[0] + '</span><span style="font-size:11px;font-weight:500;color:var(--t1)">' + row[1] + '</span></div>';
      }).join('')
    + '<div style="margin-top:12px;padding:10px;background:var(--tl);border-radius:var(--r1);border:1px solid rgba(0,212,176,.15)">'
    + '<div style="font-size:10px;font-weight:700;color:var(--teal);margin-bottom:4px">MILESTONE TRACKING</div>'
    + [['€3.000 MRR','Alcançado — Fev 2026','bdg-g'],['€5.000 MRR','Jun 2026 (estimado)','bdg-t'],['€10.000 MRR','Nov 2026 (base)','bdg-gr'],['€50.000 MRR','Q3 2027 (base)','bdg-gr']].map(function(m){
        return '<div style="display:flex;align-items:center;justify-content:space-between;padding:4px 0"><span style="font-size:11px;font-weight:500;color:var(--t1)">' + m[0] + '</span><div style="display:flex;align-items:center;gap:7px"><span style="font-size:10px;color:var(--t2)">' + m[1] + '</span><span class="bdg ' + m[2] + '">' + (m[2]==='bdg-g'?'Atingido':'Em curso') + '</span></div></div>';
      }).join('')
    + '</div></div>';

  html += '</div></div>'; /* g2 */
  el.innerHTML = html;
}

goto('mkt-dash');
